<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Items - Donation Box Inventory</title>
<link rel="icon" href="dblogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif}
:root{--primary:#0F4C81;--accent:#2563EB;--bg:#f0f4f9;--sidebar-bg:#0F4C81;--text-dark:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:14px;--radius-sm:10px;--transition:0.3s ease}
body{background:var(--bg);color:var(--text-dark);display:flex;min-height:100vh;overflow-x:hidden}
.sidebar{width:240px;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:1000;transition:transform var(--transition)}
.sidebar-brand{padding:18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-brand img{width:36px;height:36px;border-radius:8px}
.sidebar-brand h2{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sidebar-menu{padding:12px 10px;display:flex;flex-direction:column;gap:2px;flex-grow:1;overflow-y:auto}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;color:rgba(255,255,255,0.7);text-decoration:none;border-radius:var(--radius-sm);font-weight:500;font-size:13px;transition:all var(--transition);cursor:pointer}
.menu-item i{width:18px;text-align:center;font-size:14px}
.menu-item:hover{background:rgba(255,255,255,0.12);color:#fff}
.menu-item.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:600}
.sidebar-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,0.1)}
.btn-logout{width:100%;padding:10px;background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px}
.btn-logout:hover{background:rgba(239,68,68,0.35);color:#fff}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:1001;width:38px;height:38px;border-radius:10px;background:var(--sidebar-bg);color:#fff;border:none;font-size:16px;cursor:pointer;align-items:center;justify-content:center}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;opacity:0;transition:opacity var(--transition)}
.sidebar-overlay.show{display:block;opacity:1}
.main-content{margin-left:240px;width:calc(100% - 240px);padding:20px 24px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.top-bar-left h1{font-size:20px;font-weight:700;color:var(--primary)}
.user-info{display:flex;align-items:center;gap:10px;background:#fff;padding:6px 16px 6px 10px;border-radius:30px;border:1px solid var(--border);box-shadow:var(--shadow)}
.user-info .avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.user-info .name{font-size:13px;font-weight:600}
.user-info .desig{font-size:11px;color:var(--text-muted);background:#f1f5f9;padding:1px 8px;border-radius:8px}
.dash-section{background:#fff;padding:18px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-header h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-header h2 i{color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:2px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:3px}
.form-group input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none;background:#fff}
.form-group input:focus{border-color:var(--accent)}
.form-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.form-actions button{padding:9px 20px;border-radius:var(--radius-sm);font-weight:500;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:none}
.btn-action{background:var(--accent);color:#fff}.btn-action:hover{background:#1d4ed8}
.btn-action-secondary{background:#fff;color:var(--text-dark);border:1px solid var(--border)}
.btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:500px}
th{background:#f8fafc;padding:10px 12px;color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcff}
.action-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:4px}
.action-btn.edit{background:#dbeafe;color:#2563eb}
.action-btn.edit:hover{background:#bfdbfe}
.action-btn.delete{background:#fee2e2;color:#dc2626}
.action-btn.delete:hover{background:#fecaca}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state i{font-size:36px;margin-bottom:10px;opacity:0.3}
.toast{position:fixed;bottom:20px;right:20px;background:var(--primary);color:#fff;padding:12px 20px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.15);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;z-index:3000;transform:translateY(80px);opacity:0;transition:var(--transition);max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:1024px){.main-content{padding:16px 18px}}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.hamburger{display:flex}.sidebar-overlay{display:block}
.main-content{margin-left:0;width:100%;padding:60px 12px 16px}.top-bar{flex-direction:column;gap:6px}
.form-grid{grid-template-columns:1fr}.dash-section{padding:12px}table{min-width:400px}th,td{padding:6px 6px;font-size:11px}.action-btn{padding:3px 6px;font-size:10px}.toast{left:12px;right:12px;bottom:12px;max-width:none}.section-header{flex-direction:column;align-items:stretch;gap:6px}.section-header h2{font-size:14px}}
</style>
</head>
<body>
<button class="hamburger" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
<div class="sidebar-brand"><img src="dblogo.png" alt="Logo"><h2>Donation Box Inventory</h2></div>
<div class="sidebar-menu" id="dynamicSidebarMenu"><div class="menu-item active"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>
<div class="sidebar-footer"><button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
</div>
<div class="main-content">
<div class="top-bar">
<div class="top-bar-left"><h1>Item Management</h1></div>
<div class="user-info">
<div class="avatar" id="userAvatar">U</div>
<span class="name" id="adminName">Loading...</span>
<span class="desig" id="userRoleBadge">&mdash;</span>
</div>
</div>
<div class="dash-section">
<div class="section-header">
<h2><i class="fa-solid fa-cube"></i> <span id="formTitle">Add New Item</span></h2>
<button class="btn-action" onclick="exportExcel()" style="font-size:12px;padding:6px 14px;background:#059669;color:#fff"><i class="fa-solid fa-file-excel"></i> Excel</button>
</div>
<form id="itemForm" autocomplete="off">
<div class="form-grid">
<div class="form-group">
<label>Item Name <span style="color:#ef4444">*</span></label>
<input type="text" id="itemName" required placeholder="e.g. Rice, Wheat, Blanket">
</div>
<div class="form-group">
<label>Default Unit</label>
<select id="itemUnit">
<option value="Piece">Piece</option>
<option value="Box">Box</option>
<option value="Packet">Packet</option>
<option value="Kg">Kg</option>
<option value="Liter">Liter</option>
<option value="Bag">Bag</option>
<option value="Carton">Carton</option>
<option value="Set">Set</option>
<option value="Pair">Pair</option>
<option value="Dozen">Dozen</option>
</select>
</div>
</div>
<div class="form-actions">
<button type="submit" class="btn-action" id="submitBtn"><i class="fa-solid fa-floppy-disk"></i> Save Item</button>
<button type="button" class="btn-action-secondary" id="cancelBtn" style="display:none"><i class="fa-solid fa-xmark"></i> Cancel</button>
</div>
</form>
</div>
<div class="dash-section">
<div class="section-header">
<h2><i class="fa-solid fa-list"></i> All Items</h2>
<span style="font-size:11px;color:var(--text-muted)" id="itemCount">0 items</span>
</div>
    <div style="margin-bottom:10px">
<input type="text" id="filterSearch" placeholder="Search..." oninput="applyFilters()" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;box-sizing:border-box">
</div>
<div class="table-wrap">
<table>
<thead><tr><th>#</th><th>Item Name</th><th>Default Unit</th><th>Actions</th></tr></thead>
<tbody id="itemsBody"><tr><td colspan="4"><div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading items...</p></div></td></tr></tbody>
</table>
</div>
</div>
<div style="text-align:center;padding:16px 0;font-size:11px;color:var(--text-muted)">Donation Box Inventory | &copy; 2026</div>
</div>
<div class="toast" id="toast"><i class="fa-solid fa-check-circle"></i><span id="toastMsg">Done</span></div>
<script>
var firebaseConfig = {
apiKey: "AIzaSyDrblc5WOyRrSMRJdWIPm8DX2p-YSeS5MQ",
authDomain: "prodution-box-erp.firebaseapp.com",
projectId: "prodution-box-erp",
storageBucket: "prodution-box-erp.firebasestorage.app",
messagingSenderId: "426698063494",
appId: "1:426698063494:web:880dd323f24bd4121ddb07",
measurementId: "G-948852RZLB"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var allItems = [];
var filteredEntries = [];
var currentUser = null;
var editingId = null;

function showToast(msg, icon) {
var t = document.getElementById('toast');
document.getElementById('toastMsg').textContent = msg;
t.querySelector('i').className = icon || 'fa-solid fa-check-circle';
t.classList.add('show');
setTimeout(function(){ t.classList.remove('show') }, 2500);
}

function getInitials(n) {
return n ? n.split(' ').map(function(w){ return w[0] }).join('').toUpperCase().slice(0,2) : 'U';
}

document.getElementById('hamburgerBtn').addEventListener('click', function(){
document.getElementById('sidebar').classList.toggle('open');
document.getElementById('sidebarOverlay').classList.toggle('show');
});
document.getElementById('sidebarOverlay').addEventListener('click', function(){
document.getElementById('sidebar').classList.remove('open');
document.getElementById('sidebarOverlay').classList.remove('show');
});

function mi(icon, label, href, active) {
return '<a' + (href ? ' href="' + href + '"' : '') + ' class="menu-item' + (active ? ' active' : '') + '"><i class="' + icon + '"></i> ' + label + '</a>';
}

function setupSidebar(user) {
var menu = document.getElementById('dynamicSidebarMenu');
var items = mi('fa-solid fa-chart-pie', 'Dashboard', 'dashboard.html');
if (['Super Admin', 'Admin'].indexOf(user.role) !== -1) {
items += mi('fa-solid fa-cubes', 'Items', 'items.html', true);
}
if (user.role === 'Super Admin') {
items += mi('fa-solid fa-users-gear', 'User Management', 'users.html');
}
if (['Super Admin', 'Admin', 'Regional Manager', 'Regional Office', 'State Manager', 'State Office'].indexOf(user.role) !== -1) {
items += mi('fa-solid fa-warehouse', 'Warehouse', 'hubs.html');
}
items += mi('fa-solid fa-arrow-down-long', 'Stock IN', 'stock-in.html');
items += mi('fa-solid fa-arrow-up-long', 'Stock OUT', 'stock-out.html');
items += mi('fa-solid fa-file-signature', 'Demand', 'demand.html');
menu.innerHTML = items;
}

document.getElementById('logoutBtn').addEventListener('click', function(){
localStorage.removeItem('userSession');
showToast('Logging out...');
setTimeout(function(){ window.location.href = 'login.html' }, 800);
});

document.getElementById('cancelBtn').addEventListener('click', function(){
editingId = null;
document.getElementById('itemForm').reset();
document.getElementById('formTitle').textContent = 'Add New Item';
document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Item';
document.getElementById('cancelBtn').style.display = 'none';
});

document.getElementById('itemForm').addEventListener('submit', async function(e){
e.preventDefault();
var btn = document.getElementById('submitBtn');
btn.disabled = true;
btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
try {
var name = document.getElementById('itemName').value.trim();
var unit = document.getElementById('itemUnit').value;
if (!name) { showToast('Item name is required', 'fa-solid fa-triangle-exclamation'); btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Item'; return; }
if (editingId) {
await db.collection('items').doc(editingId).update({ name: name, unit: unit, updatedAt: new Date().toISOString() });
showToast('Item updated!');
} else {
await db.collection('items').add({ name: name, unit: unit, createdAt: new Date().toISOString() });
showToast('Item added!');
}
document.getElementById('itemForm').reset();
editingId = null;
document.getElementById('formTitle').textContent = 'Add New Item';
document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Item';
document.getElementById('cancelBtn').style.display = 'none';
await loadItems();
} catch(e) { console.error(e); showToast('Error: ' + e.message, 'fa-solid fa-triangle-exclamation'); }
btn.disabled = false;
btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Item';
});

async function deleteItem(id, name) {
if (!confirm('Delete item "' + name + '"?')) return;
try { await db.collection('items').doc(id).delete(); showToast('Item deleted!'); await loadItems(); }
catch(e) { showToast('Error: ' + e.message, 'fa-solid fa-triangle-exclamation'); }
}

function editItem(id) {
var item = null;
for (var i = 0; i < allItems.length; i++) { if (allItems[i].id === id) { item = allItems[i]; break; } }
if (!item) return;
editingId = id;
document.getElementById('formTitle').textContent = 'Edit Item';
document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Update Item';
document.getElementById('cancelBtn').style.display = 'inline-flex';
document.getElementById('itemName').value = item.name || '';
document.getElementById('itemUnit').value = item.unit || 'Piece';
}

function applyFilters() {
    var q = document.getElementById("filterSearch").value.toLowerCase().trim();
    if (!q) { filteredEntries = []; renderItems(); return; }
    filteredEntries = allItems.filter(function(e) {
        var text = "";
        for (var key in e) {
            if (typeof e[key] === "string") text += " " + e[key].toLowerCase();
        }
        return text.indexOf(q) !== -1;
    });
    renderItems();
}

function renderItems() {
var list = filteredEntries.length ? filteredEntries : allItems;
var tb = document.getElementById('itemsBody');
document.getElementById('itemCount').textContent = list.length + ' items';
tb.innerHTML = '';
if (!list.length) {
tb.innerHTML = '<tr><td colspan="4"><div class="empty-state"><i class="fa-solid fa-cubes"></i><p>No items added yet.</p></div></td></tr>';
return;
}
for (var i = 0; i < list.length; i++) {
var it = list[i];
tb.innerHTML += '<tr><td>' + (i + 1) + '</td><td><strong>' + esc(it.name) + '</strong></td><td>' + esc(it.unit || '-') + '</td><td><button class="action-btn edit" onclick="editItem(\'' + escAttr(it.id) + '\')"><i class="fa-solid fa-pen-to-square"></i> Edit</button> <button class="action-btn delete" onclick="deleteItem(\'' + escAttr(it.id) + '\',\'' + escAttr(it.name) + '\')"><i class="fa-solid fa-trash-can"></i> Delete</button></td></tr>';
}
}

function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { if (!s) return ''; return s.replace(/'/g,"\\'").replace(/"/g,'\\"'); }

async function loadItems() {
try {
var snap = await db.collection('items').get();
allItems = [];
snap.forEach(function(d){ allItems.push(Object.assign({id: d.id}, d.data())) });
allItems.sort(function(a, b){ return (a.name || '').localeCompare(b.name || '') });
applyFilters();
} catch(e) { console.error(e); showToast('Error loading items', 'fa-solid fa-triangle-exclamation'); }
}

function exportExcel() {
    if (!allItems.length) { showToast("No data to export", "fa-solid fa-triangle-exclamation"); return; }
    var wsData = [["Name","Unit","Type","Category","Description","Status"]];
    for (var i = 0; i < allItems.length; i++) {
        var e = allItems[i];
        wsData.push([e.name||"-", e.unit||"-", e.type||"-", e.category||"-", e.description||"-", e.status||"-"]);
    }
    var wb = XLSX.utils.book_new();
    var ws = XLSX.utils.aoa_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb, ws, "Items");
    XLSX.writeFile(wb, "items_export.xlsx");
}

window.addEventListener('DOMContentLoaded', async function(){
try {
var sessionStr = localStorage.getItem('userSession');
if (!sessionStr) { showToast('Session invalid!'); setTimeout(function(){ window.location.href = 'login.html' }, 1200); return; }
var user = JSON.parse(sessionStr);
if (!user || !user.role) { showToast('Session invalid!'); setTimeout(function(){ window.location.href = 'login.html' }, 1200); return; }
if (['Super Admin', 'Admin'].indexOf(user.role) === -1) { showToast('Access denied!'); setTimeout(function(){ window.location.href = 'dashboard.html' }, 1200); return; }
currentUser = user;
document.getElementById('userAvatar').textContent = getInitials(user.fullName);
document.getElementById('adminName').innerText = user.fullName || 'User';
document.getElementById('userRoleBadge').innerText = user.role || '-';
setupSidebar(user);
await loadItems();
} catch(e) { console.error(e); showToast('Error: ' + e.message, 'fa-solid fa-triangle-exclamation'); }
});
</script>
    <script>
document.head.insertAdjacentHTML('beforeend','<style>@media(max-width:768px){.sidebar-overlay{display:none!important}}</style>');
</script>
</body>
</html>
