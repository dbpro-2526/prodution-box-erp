<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Demand - Donation Box Inventory</title>
<link rel="icon" href="dblogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif}
:root{--primary:#0F4C81;--accent:#2563EB;--bg:#f0f4f9;--sidebar-bg:#0F4C81;--text-dark:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:14px;--radius-sm:10px;--transition:0.3s ease}
body{background:var(--bg);color:var(--text-dark);display:flex;min-height:100vh;overflow-x:hidden}
.sidebar{width:240px;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:1000;transition:transform var(--transition)}
.sidebar-brand{padding:18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-brand img{width:36px;height:36px;border-radius:8px}
.sidebar-brand h2{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sidebar-menu{padding:12px 10px;display:flex;flex-direction:column;gap:2px;flex-grow:1;overflow-y:auto}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;color:rgba(255,255,255,0.7);text-decoration:none;border-radius:var(--radius-sm);font-weight:500;font-size:13px;transition:all var(--transition);cursor:pointer}
.menu-item i{width:18px;text-align:center;font-size:14px}
.menu-item:hover{background:rgba(255,255,255,0.12);color:#fff}
.menu-item.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:600}
.sidebar-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,0.1)}
.btn-logout{width:100%;padding:10px;background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px}
.btn-logout:hover{background:rgba(239,68,68,0.35);color:#fff}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:1001;width:38px;height:38px;border-radius:10px;background:var(--sidebar-bg);color:#fff;border:none;font-size:16px;cursor:pointer;align-items:center;justify-content:center}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;opacity:0;transition:opacity var(--transition)}
.sidebar-overlay.show{opacity:1}
.main-content{margin-left:240px;width:calc(100% - 240px);padding:20px 24px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.top-bar-left h1{font-size:20px;font-weight:700;color:var(--primary)}
.user-info{display:flex;align-items:center;gap:10px;background:#fff;padding:6px 16px 6px 10px;border-radius:30px;border:1px solid var(--border);box-shadow:var(--shadow)}
.user-info .avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.user-info .name{font-size:13px;font-weight:600}
.user-info .desig{font-size:11px;color:var(--text-muted);background:#f1f5f9;padding:1px 8px;border-radius:8px}
.form-card{background:#fff;padding:24px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);max-width:800px;margin:0 auto 20px}
.form-card h2{font-size:16px;font-weight:600;color:var(--primary);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-card h2 i{color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px}
.form-group label .required{color:#ef4444}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff;transition:border-color var(--transition)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group input:disabled,.form-group select:disabled{background:#f1f5f9;cursor:not-allowed;opacity:0.7}
.form-group textarea{resize:vertical;min-height:80px}
.form-group .error-text{font-size:11px;color:#ef4444;margin-top:3px;display:none}
.form-group .lock-badge{font-size:10px;color:var(--text-muted);margin-top:2px;display:block}
.form-group input.error,.form-group select.error{border-color:#ef4444}
.btn-submit{grid-column:1/-1;padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background var(--transition);margin-top:4px}
.btn-submit:hover{background:#1d4ed8}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed}
.dash-section{background:#fff;padding:18px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-header h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-header h2 i{color:var(--accent)}
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:700px}
th{background:#f8fafc;padding:10px 12px;color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcff}
.status-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.status-pending{background:#fef3c7;color:#d97706}
.status-approved{background:#d1fae5;color:#059669}
.status-rejected{background:#fee2e2;color:#dc2626}
.status-dispatched{background:#dbeafe;color:#2563eb}
.status-completed{background:#e2e8f0;color:#475569}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.item-list-wrap{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:4px}
.item-list-wrap .item-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #e2e8f0;font-size:13px}
.item-list-wrap .item-row:last-child{border-bottom:none}
.item-list-wrap .item-row .remove-item{color:#ef4444;cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}
.item-list-wrap .item-row .remove-item:hover{background:#fee2e2}
.add-item-bar{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.add-item-bar .form-group{flex:1;min-width:100px;margin-bottom:0}
.add-item-bar .form-group label{font-size:11px}
.add-item-bar .form-group input,.add-item-bar .form-group select{padding:7px 10px;font-size:12px}
.btn-add-item{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn-add-item:hover{background:#1d4ed8}
.action-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:4px}
.action-btn.edit{background:#dbeafe;color:#2563eb}.action-btn.edit:hover{background:#bfdbfe}
.action-btn.delete{background:#fee2e2;color:#dc2626}.action-btn.delete:hover{background:#fecaca}
.action-btn.approve{background:#d1fae5;color:#059669}.action-btn.approve:hover{background:#a7f3d0}
.action-btn.reject{background:#fee2e2;color:#dc2626}.action-btn.reject:hover{background:#fecaca}
.action-btn.dispatch{background:#fef3c7;color:#d97706}.action-btn.dispatch:hover{background:#fde68a}
.action-btn.receive{background:#d1fae5;color:#059669}.action-btn.receive:hover{background:#a7f3d0}
.empty-state i{font-size:36px;margin-bottom:10px;opacity:0.3}
.file-upload-wrap{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.file-upload-wrap input[type=file]{font-size:12px;flex:1;min-width:140px}
.file-upload-wrap .file-name{font-size:11px;color:var(--text-muted)}
.spinner-container{display:flex;align-items:center;justify-content:center;padding:60px 20px}
.spinner-container .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-text{text-align:center;font-size:11px;color:var(--text-muted);margin-top:24px;padding-bottom:10px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--primary);color:#fff;padding:12px 20px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.15);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;z-index:3000;transform:translateY(80px);opacity:0;transition:var(--transition);max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:#dc2626}
.toast.success{background:var(--primary)}
.float-add-btn{position:fixed;top:82px;right:24px;z-index:500;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,0.4);transition:all var(--transition);display:flex;align-items:center;justify-content:center}
.float-add-btn:hover{transform:scale(1.08);background:#1d4ed8}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px}
.modal-overlay.show{display:flex}
.modal-container{background:#fff;border-radius:var(--radius);max-width:820px;width:100%;margin:auto;box-shadow:0 12px 48px rgba(0,0,0,0.2);animation:modalIn .2s ease;position:relative}
@keyframes modalIn{from{opacity:0;transform:translateY(-20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:16px;font-weight:600;color:var(--primary);display:flex;align-items:center;gap:8px}
.modal-header h2 i{color:var(--accent)}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:#f1f5f9;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-muted);transition:all var(--transition);flex-shrink:0}
.modal-close:hover{background:#e2e8f0;color:var(--text-dark)}
.modal-body{padding:20px 24px 24px}
.modal-body .form-card{box-shadow:none;margin:0;padding:0;border:none;border-radius:0}
.img-viewer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:5000;justify-content:center;align-items:center;padding:20px;cursor:pointer}
.img-viewer-overlay.show{display:flex}
.img-viewer-wrap{position:relative;max-width:92vw;max-height:92vh;display:flex;flex-direction:column;align-items:center}
.img-viewer-wrap img{max-width:100%;max-height:85vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.4);cursor:default}
.img-viewer-close,.img-viewer-download{position:fixed;top:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.12);color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:background 0.2s}
.img-viewer-close:hover,.img-viewer-download:hover{background:rgba(255,255,255,0.3)}
.img-viewer-close{right:16px}.img-viewer-download{right:66px}
.attach-thumb{display:inline-block;width:36px;height:36px;border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--border);vertical-align:middle}
.attach-thumb img{width:100%;height:100%;object-fit:cover}
.attach-icon{color:var(--accent);font-size:16px;cursor:pointer;vertical-align:middle}
@media(max-width:768px){.float-add-btn{top:60px;right:12px}.modal-overlay{padding:16px 8px;align-items:center}.modal-body{padding:16px}}

@media(max-width:1024px){.main-content{padding:16px 18px}}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.hamburger{display:flex}.sidebar-overlay{display:block}
.main-content{margin-left:0;width:100%;padding:60px 12px 16px}.top-bar{flex-direction:column}
.form-grid{grid-template-columns:1fr}.form-card{padding:16px}.dash-section{padding:12px}table{min-width:550px}.toast{left:12px;right:12px;bottom:12px;max-width:none}}
@media(max-width:480px){.form-card{padding:12px}}
</style>
</head>
<body>
<button class="hamburger" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
<div class="sidebar-brand"><img src="dblogo.png" alt="Logo"><h2>Donation Box Inventory</h2></div>
<div class="sidebar-menu" id="dynamicSidebarMenu"><div class="menu-item active"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>
<div class="sidebar-footer"><button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
</div>

<div class="main-content">
<div class="top-bar">
<div class="top-bar-left"><h1>Demand Form</h1></div>
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
<div class="user-info">
<div class="avatar" id="userAvatar">U</div>
<span class="name" id="adminName">Loading...</span>
<span class="desig" id="userRoleBadge">&mdash;</span>
</div>
</div>
</div>

<div id="loadingSpinner" class="spinner-container"><div class="spinner"></div></div>

<div id="formContent" style="display:none">

<div class="dash-section">
<div class="section-header">
<h2><i class="fa-solid fa-list"></i> All Demands</h2>
<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
<button class="btn-action" onclick="document.getElementById('addEntryBtn').click()" style="font-size:12px;padding:6px 14px"><i class="fa-solid fa-plus"></i> Add Demand</button>
<button class="btn-action" onclick="exportExcel()" style="font-size:12px;padding:6px 14px;background:#059669;color:#fff" title="Export to Excel"><i class="fa-solid fa-file-excel"></i> Excel</button>
<span style="font-size:11px;color:var(--text-muted)" id="historyCount">0 entries</span>
</div>
</div>
<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
<input type="text" id="filterSearch" placeholder="Search demands..." oninput="applyFilters()" style="flex:1;min-width:160px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px">
<select id="filterStatus" onchange="applyFilters()" style="padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px">
<option value="">All Status</option>
<option value="Pending">Pending</option>
<option value="Approved">Approved</option>
<option value="Rejected">Rejected</option>
<option value="Dispatched">Dispatched</option>
<option value="Completed">Completed</option>
</select>
</div>
<div class="table-wrap">
<table>
<thead>
                        <tr><th>Date</th><th>Items</th><th>Priority</th><th>Entity</th><th>Division</th><th>Hub</th><th>Status</th><th>Requested By</th><th>Attachment</th><th>Actions</th></tr>
                </thead>
                <tbody id="historyBody"><tr><td colspan="10"><div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading...</p></div></td></tr></tbody>
</table>
</div>
</div>

<div class="footer-text">Donation Box Inventory | &copy; 2026</div>
<button class="float-add-btn" id="addEntryBtn" title="Add Demand"><i class="fa-solid fa-plus"></i></button>
</div>

<div class="modal-overlay" id="entryModal">
<div class="modal-container">
<div class="modal-header">
<h2><i class="fa-solid fa-file-signature"></i> New Demand Entry</h2>
<button class="modal-close" id="modalCloseBtn" type="button"><i class="fa-solid fa-xmark"></i></button>
</div>
<div class="modal-body">
<div class="form-card">
<form id="demandForm" autocomplete="off">
<div class="form-grid">
<div class="form-group">
<label>Date</label>
<input type="date" id="fieldDate" required>
</div>
                <div class="form-group full">
                        <label>Add Items <span style="color:#ef4444">*</span></label>
                        <div class="add-item-bar">
                        <div class="form-group">
                        <label>Item</label>
                        <select id="fieldItemName"><option value="">Select</option></select>
                        </div>
                        <div class="form-group">
                        <label>Qty</label>
                        <input type="number" id="fieldQuantity" placeholder="0" min="1">
                        </div>
                        <div class="form-group">
                        <label>Unit</label>
                        <select id="fieldUnit">
                        <option value="Piece">Piece</option><option value="Box">Box</option><option value="Packet">Packet</option>
                        <option value="Kg">Kg</option><option value="Liter">Liter</option><option value="Bag">Bag</option>
                        <option value="Carton">Carton</option><option value="Set">Set</option><option value="Pair">Pair</option><option value="Dozen">Dozen</option>
                        </select>
                        </div>
                        <button type="button" class="btn-add-item" id="btnAddItem"><i class="fa-solid fa-plus"></i> Add</button>
                        </div>
                        <div class="item-list-wrap" id="itemListContainer">
                        <div class="empty-state" style="padding:8px;font-size:12px" id="emptyItemList">No items added yet.</div>
                        </div>
                        <span class="error-text" id="errorItems" style="display:none">At least one item is required</span>
                </div>
<div class="form-group">
<label>Region</label>
<select id="fieldRegion"><option value="">Loading...</option></select>
<span class="lock-badge" id="lockRegion"></span>
</div>
<div class="form-group">
<label>State</label>
<select id="fieldState"><option value="">Select region first</option></select>
<span class="lock-badge" id="lockState"></span>
</div>
<div class="form-group">
<label>Division</label>
<select id="fieldDivision"><option value="">Select state first</option></select>
<span class="lock-badge" id="lockDivision"></span>
</div>
<div class="form-group">
<label>Priority</label>
<select id="fieldPriority">
<option value="High">High</option>
<option value="Medium" selected>Medium</option>
<option value="Low">Low</option>
</select>
</div>
<div class="form-group">
<label>Requesting Entity</label>
<input type="text" id="fieldRequestingEntity" placeholder="Who is requesting">
</div>
<div class="form-group">
<label>Hub / Warehouse</label>
<select id="fieldHub"><option value="">Loading...</option></select>
<span class="lock-badge" id="lockHub"></span>
</div>
                <div class="form-group full">
                        <label>Attachment</label>
                        <div class="file-upload-wrap">
                        <input type="file" id="fieldFile" accept="image/*,.pdf" onchange="previewAttachFile()">
                        <span class="file-name" id="fileNameDisplay"></span>
                        </div>
                        <img id="fieldAttachPreview" style="display:none;margin-top:6px;max-width:120px;max-height:80px;border-radius:6px;border:1px solid var(--border);cursor:pointer" onclick="openImgViewer(this.src)" alt="">
                        <span id="attachFileSize" style="font-size:11px;color:var(--text-muted)"></span>
                </div>
                <div class="form-group full">
                        <label>Notes</label>
                        <textarea id="fieldNotes" placeholder="Optional notes..."></textarea>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn"><i class="fa-solid fa-paper-plane"></i> Submit Demand</button>
</div>
</form>
</div>
</div>
</div>
</div>

</div>

<div class="toast" id="toast"><i class="fa-solid fa-check-circle"></i><span id="toastMsg">Done</span></div>

<div class="img-viewer-overlay" id="imgViewer" onclick="closeImgViewer()">
<a class="img-viewer-download" id="imgDownloadBtn" href="#" target="_blank" title="Download" onclick="event.stopPropagation()"><i class="fa-solid fa-download"></i></a>
<button class="img-viewer-close" onclick="closeImgViewer()"><i class="fa-solid fa-xmark"></i></button>
<div class="img-viewer-wrap" onclick="event.stopPropagation()">
<img id="imgViewerSrc" src="" alt="Attachment">
</div>
</div>

    storageBucket: "prodution-box-erp.firebasestorage.app",

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var currentUser = null;
var allHubs = [];
var allEntries = [];
var isSubmitting = false;
var isReceiving = false;
var regionsCache = [];
var allItems = [];
var demandItems = [];
var editingId = null;
var uploadedFileUrl = "";

function showToast(msg, type) {
    var t = document.getElementById("toast");

async function loadStates(region) {

function getDirectUrl(url) {
  if (!url) return url;
  var m = url.match(/\/file\/d\/([^/]+)/);
  if (m) return "https://drive.google.com/uc?export=view&id=" + m[1];
  m = url.match(/[?&]id=([^&]+)/);
  if (m && url.indexOf("drive.google.com") !== -1) return "https://drive.google.com/uc?export=view&id=" + m[1];
  return url;
}

var uploadedFileData = "";

function previewAttachFile() {
  var file = document.getElementById("fieldFile").files[0];
  var nameEl = document.getElementById("fileNameDisplay");
  var img = document.getElementById("fieldAttachPreview");
  var sizeEl = document.getElementById("attachFileSize");
  if (!file) { nameEl.textContent = ""; img.style.display = "none"; sizeEl.textContent = ""; uploadedFileData = ""; return; }
  nameEl.textContent = file.name;
  sizeEl.textContent = (file.size / 1024).toFixed(1) + " KB";
  if (!file.type.match(/image\//)) {
    var reader = new FileReader();
    reader.onload = function(e) { uploadedFileData = e.target.result; };
    reader.readAsDataURL(file);
    img.style.display = "none";
    return;
  }
  var reader = new FileReader();
  reader.onload = function(e) {
    var dataUrl = e.target.result;
    var canvas = document.createElement("canvas");
    var ctx = canvas.getContext("2d");
    var imgObj = new Image();
    imgObj.onload = function() {
      var maxW = 600, maxH = 600, w = imgObj.width, h = imgObj.height;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      ctx.drawImage(imgObj, 0, 0, w, h);
      uploadedFileData = canvas.toDataURL("image/jpeg", 0.6);
      img.src = uploadedFileData;
      img.style.display = "block";
    };
    imgObj.src = dataUrl;
  };
  reader.readAsDataURL(file);
}

async function loadHistory() {
    try {
        var query = db.collection("demands");
        if (currentUser && currentUser.division && currentUser.role !== "Super Admin" && currentUser.role !== "Admin") {
            query = query.where("division", "==", currentUser.division);
        }
        var snap = await query.orderBy("date", "desc").limit(200).get();
        allEntries = snap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()) });
        applyFilters();
    } catch(e) {
        console.error("Error loading demands", e);
        try {
            var snap = await db.collection("demands").get();
            allEntries = [];
            var docs = snap.docs;
            for (var i = 0; i < docs.length; i++) {
                var data = docs[i].data();
                if (currentUser && currentUser.division && currentUser.role !== "Super Admin" && currentUser.role !== "Admin" && data.division !== currentUser.division) continue;
                allEntries.push(Object.assign({id: docs[i].id}, data));
            }
            allEntries.sort(function(a, b){ return (b.date || "").localeCompare(a.date || "") });
            applyFilters();
        } catch(e2) {
            console.error("Fallback error", e2);
            document.getElementById("historyBody").innerHTML = '<tr><td colspan="10"><div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Error loading demands</p></div></td></tr>';
        }
    }
}

function statusClass(status) {

    if (s.indexOf("approv") !== -1) return "status-approved";
    if (s.indexOf("reject") !== -1) return "status-rejected";
    if (s.indexOf("dispatch") !== -1) return "status-dispatched";
    if (s.indexOf("complete") !== -1) return "status-completed";
    return "status-pending";
}

}

function canEditDemand(entry) {
    if (!currentUser) return false;

function canReceive(entry) {
    if (!currentUser) { console.warn("canReceive: no user"); return false; }
    if (["Super Admin", "Admin"].indexOf(currentUser.role) !== -1) return true;
    var st = entry.status || "Pending";
    if (st !== "Dispatched") return false;
    console.log("canReceive debug:", { entryDiv: entry.division, userDiv: currentUser.division, entryRegion: entry.region, userRegion: currentUser.region, entryState: entry.state, userState: currentUser.state });
    if (entry.division && currentUser.division && entry.division === currentUser.division) return true;
    if (!entry.division && entry.region && currentUser.region && entry.region === currentUser.region) return true;

async function dispatchDemand(id) {
    var entry = null;
    for (var i = 0; i < allEntries.length; i++) { if (allEntries[i].id === id) { entry = allEntries[i]; break; } }
    if (!entry) return;
    if (!confirm("Dispatch this demand?")) return;
    try {
        var items = entry.items && entry.items.length ? entry.items : [{itemName: entry.itemName, quantity: entry.quantity || 0, unit: entry.unit || "Piece"}];
        var dispatchLog = entry.dispatchLog || [];
        var now = new Date().toISOString().split("T")[0];
        for (var i = 0; i < items.length; i++) {
            var it = items[i];
            dispatchLog.push({ itemName: it.itemName, quantity: it.quantity, unit: it.unit, dispatchedBy: currentUser.fullName, dispatchedAt: now });
        }
        await db.collection("demands").doc(id).update({ status: "Dispatched", dispatchLog: dispatchLog, dispatchedAt: now, dispatchedBy: currentUser.fullName });
        showToast("Demand dispatched!", "success");
        await loadHistory();
    } catch(e) { console.error(e); showToast("Error: " + e.message, "error"); }
}

async function receiveDemand(id) {
    if (isReceiving) return;
    var entry = null;
    for (var i = 0; i < allEntries.length; i++) { if (allEntries[i].id === id) { entry = allEntries[i]; break; } }
    if (!entry) return;
    if (!confirm("Confirm receive of all items?")) return;
    isReceiving = true;
    try {
        var items = entry.items && entry.items.length ? entry.items : [{itemName: entry.itemName, quantity: entry.quantity || 0, unit: entry.unit || "Piece"}];
        var receiveLog = entry.receiveLog || [];
        var now = new Date().toISOString().split("T")[0];
        for (var i = 0; i < items.length; i++) {
            var it = items[i];
            await db.collection("stock_ledger").add({
                date: now,
                itemName: it.itemName,
                quantity: it.quantity || 0,
                unit: it.unit || "Piece",
                region: entry.region || "",
                state: entry.state || "",
                division: entry.division || "",
                hub: entry.hub || entry.hubName || "",
                source: entry.requestingEntity || "",
                notes: "Demand #" + entry.id + " auto-fulfilled",
                type: "IN",
                createdBy: (currentUser && currentUser.fullName) || "Unknown",
                role: (currentUser && currentUser.role) || "",
                demandId: entry.id,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            receiveLog.push({ itemName: it.itemName, quantity: it.quantity, unit: it.unit, receivedBy: currentUser.fullName, receivedAt: now });
        }
        await db.collection("demands").doc(id).update({ status: "Completed", receiveLog: receiveLog, receivedAt: now, receivedBy: currentUser.fullName });
        showToast("Demand completed! Stock IN auto-created.", "success");
        await loadHistory();
    } catch(e) { console.error(e); showToast("Error: " + e.message, "error"); }
    isReceiving = false;
}

var filteredEntries = [];

function applyFilters() {
    var q = document.getElementById("filterSearch").value.toLowerCase().trim();
    var st = document.getElementById("filterStatus").value;
    filteredEntries = allEntries.filter(function(e) {
        if (st && e.status !== st) return false;
        if (!q) return true;
        var searchText = (e.date + " " + e.priority + " " + e.requestingEntity + " " + e.division + " " + e.hub + " " + e.hubName + " " + e.status + " " + e.createdBy + " " + e.notes).toLowerCase();
        if (e.items) e.items.forEach(function(it) { searchText += " " + (it.itemName || "") + " x" + (it.quantity || 0) + " " + (it.unit || ""); });
        return searchText.indexOf(q) !== -1;
    });
    renderHistory();
}

function renderHistory() {
    var tb = document.getElementById("historyBody");
    var list = (typeof filteredEntries !== "undefined" && filteredEntries.length) ? filteredEntries : allEntries;
    document.getElementById("historyCount").textContent = list.length + " entries";
    tb.innerHTML = "";
    if (!list.length) {
        tb.innerHTML = '<tr><td colspan="10"><div class="empty-state"><i class="fa-solid fa-file-signature"></i><p>No demands yet.</p></div></td></tr>';
        return;
    }
    for (var i = 0; i < list.length; i++) {
        var e = list[i];
        var st = e.status || "Pending";
        var itemsHtml = itemsDisplay(e);
        var attachHtml = "-";
        var src = e.attachmentData || e.attachmentUrl;
        if (src) {
          var dl = getDirectUrl(src);
          if (src.match(/^data:image/) || dl.match(/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?.*)?$/i) || dl.indexOf("uc?export=view") !== -1) {
            attachHtml = '<span style="display:inline-flex;align-items:center;gap:6px">'
              + '<span class="attach-thumb" onclick="openImgViewer(\'' + escAttr(dl) + '\')"><img src="' + esc(dl) + '" alt=""></span>'
              + '<a href="' + esc(dl) + '" download="attachment" class="attach-icon" title="Download"><i class="fa-solid fa-download"></i></a>'
              + '</span>';
          } else {
            attachHtml = '<span style="display:inline-flex;align-items:center;gap:6px">'
              + '<a href="' + esc(dl) + '" target="_blank" class="attach-icon" title="View"><i class="fa-solid fa-paperclip"></i></a>'
              + '<a href="' + esc(dl) + '" download="attachment" class="attach-icon" title="Download"><i class="fa-solid fa-download"></i></a>'
              + '</span>';
          }
        }
        var actionsHtml = "";
        if (canApprove(e)) {
            actionsHtml += '<button class="action-btn approve" onclick="approveDemand(\'' + escAttr(e.id) + '\')"><i class="fa-solid fa-check-circle"></i> Approve</button> ';
            actionsHtml += '<button class="action-btn reject" onclick="rejectDemand(\'' + escAttr(e.id) + '\')"><i class="fa-solid fa-times-circle"></i> Reject</button> ';
        }
        if (canEditDemand(e) && st === "Pending") {
            actionsHtml += '<button class="action-btn edit" onclick="editDemand(\'' + escAttr(e.id) + '\')"><i class="fa-solid fa-pen-to-square"></i></button> ';
        }
        if (canDeleteDemand(e)) {
            actionsHtml += '<button class="action-btn delete" onclick="deleteDemand(\'' + escAttr(e.id) + '\')"><i class="fa-solid fa-trash-can"></i></button> ';
        }
        if (canDispatch(e)) {
            actionsHtml += '<button class="action-btn dispatch" onclick="dispatchDemand(\'' + escAttr(e.id) + '\')"><i class="fa-solid fa-truck"></i> Dispatch</button> ';
        }
        if (canReceive(e)) {
            actionsHtml += '<button class="action-btn receive" onclick="receiveDemand(\'' + escAttr(e.id) + '\')"><i class="fa-solid fa-check"></i> Receive</button> ';
        }
        var statusHtml = '<span class="status-badge ' + statusClass(st) + '">' + esc(st) + '</span>';
        if (st === "Rejected" && e.rejectionReason) {
            statusHtml += '<div style="font-size:10px;color:#dc2626;margin-top:2px;line-height:1.3">' + esc(e.rejectionReason) + '</div>';
        }
        tb.innerHTML += "<tr><td>" + esc(e.date || "-") + '</td><td>' + itemsHtml + '</td><td>' + esc(e.priority || "-") + '</td><td>' + esc(e.requestingEntity || "-") + '</td><td>' + esc(e.division || "-") + '</td><td>' + esc(e.hub || e.hubName || "-") + '</td><td>' + statusHtml + '</td><td>' + esc(e.createdBy || "-") + '</td><td>' + attachHtml + '</td><td style="white-space:nowrap">' + actionsHtml + "</td></tr>";
    }
}

function esc(s) {
    if (!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function escAttr(s) {
    if (!s) return "";
    return s.replace(/'/g,"\\'").replace(/"/g,'\\"');
}

function openModal() {
    document.getElementById("entryModal").classList.add("show");
    document.body.style.overflow = "hidden";
}

function closeModal() {
    document.getElementById("entryModal").classList.remove("show");
    document.body.style.overflow = "";
    if (editingId) {
        editingId = null;
        document.getElementById("submitBtn").innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Demand';
    }
}

async function initForm() {
    var regionSel = document.getElementById("fieldRegion");
    var stateSel = document.getElementById("fieldState");
    var divSel = document.getElementById("fieldDivision");
    var hubSel = document.getElementById("fieldHub");

    document.getElementById("fieldDate").value = new Date().toISOString().split("T")[0];
    await loadHubs();
    await loadItems();
    populateItemDropdown();
    var regions = await loadRegions();
    populateSelect(regionSel, regions, "Select region");
    var hubNames = [...new Set(allHubs.map(function(h){ return h.name || h.hubName }).filter(Boolean))].sort();
    populateSelect(hubSel, hubNames, "Select hub");

    lockField("fieldRegion", "lockRegion", currentUser.region, "Region");
    lockField("fieldHub", "lockHub", currentUser.hub || currentUser.warehouse, "Hub");

    if (currentUser && currentUser.region && regionSel.disabled) {
        regionSel.value = currentUser.region;
        var states = await loadStates(currentUser.region);
        populateSelect(stateSel, states, "Select state");
        if (currentUser.state && states.indexOf(currentUser.state) !== -1) {
            stateSel.value = currentUser.state;
            stateSel.disabled = true;
            document.getElementById("lockState").textContent = "Locked: State = " + currentUser.state;
            var divisions = await loadDivisions(currentUser.state);
            populateSelect(divSel, divisions, "Select division");
            if (currentUser.division && divisions.indexOf(currentUser.division) !== -1) {
                divSel.value = currentUser.division;
                divSel.disabled = true;
                document.getElementById("lockDivision").textContent = "Locked: Division = " + currentUser.division;
            }
        }
    }

    regionSel.addEventListener("change", onRegionChange);
    stateSel.addEventListener("change", onStateChange);

    document.getElementById("loadingSpinner").style.display = "none";
    document.getElementById("formContent").style.display = "block";

    await loadHistory();
}

document.getElementById("demandForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    if (isSubmitting) return;

    if (!demandItems.length) { document.getElementById("errorItems").style.display = "block"; showToast("Add at least one item", "error"); return; }
    document.getElementById("errorItems").style.display = "none";

    isSubmitting = true;
    var btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

    try {
        var attachData = uploadedFileData;

        var data = {
            date: document.getElementById("fieldDate").value,
            items: demandItems.map(function(it){ return {itemName: it.itemName, quantity: it.quantity, unit: it.unit} }),
            region: document.getElementById("fieldRegion").value || "",
            state: document.getElementById("fieldState").value || "",
            division: document.getElementById("fieldDivision").value || "",
            priority: document.getElementById("fieldPriority").value,
            requestingEntity: document.getElementById("fieldRequestingEntity").value.trim() || "",
            hub: document.getElementById("fieldHub").value || "",
            notes: document.getElementById("fieldNotes").value.trim() || "",
            attachmentData: attachData,
            attachmentUrl: attachData || uploadedFileUrl,
            createdBy: (currentUser && currentUser.fullName) || "Unknown",
            role: (currentUser && currentUser.role) || ""
        };

        if (editingId) {
            data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
            data.updatedBy = (currentUser && currentUser.fullName) || "Unknown";
            await db.collection("demands").doc(editingId).update(data);
            showToast("Demand updated!", "success");
            editingId = null;
            document.getElementById("submitBtn").innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Demand';
        } else {
            data.status = "Pending";
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection("demands").add(data);
            showToast("Demand submitted!", "success");
        }

        demandItems = [];
        renderItemList();
        document.getElementById("fieldPriority").value = "Medium";
        document.getElementById("fieldRequestingEntity").value = "";
        document.getElementById("fieldNotes").value = "";
        document.getElementById("fieldFile").value = "";
        document.getElementById("fileNameDisplay").textContent = "";
        document.getElementById("fieldAttachPreview").style.display = "none";
        document.getElementById("attachFileSize").textContent = "";
        uploadedFileUrl = "";
        uploadedFileData = "";
        if (!document.getElementById("fieldRegion").disabled) {
            document.getElementById("fieldRegion").value = "";
            document.getElementById("fieldState").innerHTML = '<option value="">Select region first</option>';
            document.getElementById("fieldDivision").innerHTML = '<option value="">Select state first</option>';
        }
        if (!document.getElementById("fieldHub").disabled) {
            document.getElementById("fieldHub").value = "";
        }
        await loadHistory();
        closeModal();
    } catch (err) {
        console.error("Save error:", err);
        showToast("Error: " + (err.message || "Unknown"), "error");
    } finally {
        isSubmitting = false;
        btn.disabled = false;
        btn.innerHTML = editingId ? '<i class="fa-solid fa-pen-to-square"></i> Update Demand' : '<i class="fa-solid fa-paper-plane"></i> Submit Demand';
    }
});

document.getElementById("logoutBtn").addEventListener("click", function() {
    localStorage.removeItem("userSession");
    showToast("Logging out...");
    setTimeout(function(){ window.location.href = "login.html" }, 800);
});

window.addEventListener("DOMContentLoaded", async function() {
    var userRaw = localStorage.getItem("userSession");
    if (!userRaw) { showToast("Session invalid!", "error"); setTimeout(function(){ window.location.href = "login.html" }, 1200); return; }
    try { currentUser = JSON.parse(userRaw); } catch(e) { showToast("Session invalid!", "error"); setTimeout(function(){ window.location.href = "login.html" }, 1200); return; }
    if (!currentUser || !currentUser.role) { showToast("Session invalid!", "error"); setTimeout(function(){ window.location.href = "login.html" }, 1200); return; }
    document.getElementById("userAvatar").textContent = getInitials(currentUser.fullName);
    document.getElementById("adminName").innerText = currentUser.fullName || "User";
    document.getElementById("userRoleBadge").innerText = currentUser.role || "-";
    buildSidebar(currentUser.role);
    await initForm();
});

document.getElementById("addEntryBtn").addEventListener("click", function() {
    editingId = null;
    document.getElementById("submitBtn").innerHTML = '<i class="fa-solid fa-paper-plane"></i> Submit Demand';
    demandItems = [];
    renderItemList();
    document.getElementById("fieldPriority").value = "Medium";
    document.getElementById("fieldRequestingEntity").value = "";
    document.getElementById("fieldNotes").value = "";
    document.getElementById("fieldFile").value = "";
    document.getElementById("fileNameDisplay").textContent = "";
    document.getElementById("fieldAttachPreview").style.display = "none";
    document.getElementById("attachFileSize").textContent = "";
    uploadedFileUrl = "";
    uploadedFileData = "";
    document.getElementById("fieldDate").value = new Date().toISOString().split("T")[0];
    document.getElementById("errorItems").style.display = "none";
    openModal();
});

document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
document.getElementById("entryModal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
});
</script>
