<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Box ERP</title>

    <link rel="icon" href="dblogo.png">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:#f5f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
            background:#fff;
            padding:40px;
            width:400px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.15);
        }

        img{
            width:100px;
            margin-bottom:20px;
        }

        h1{
            color:#1565C0;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:30px;
        }

        .btn{
            display:block;
            width:100%;
            padding:15px;
            background:#1565C0;
            color:#fff;
            text-decoration:none;
            border-radius:8px;
            font-size:18px;
            transition:.3s;
        }

        .btn:hover{
            background:#0D47A1;
        }

        .version{
            margin-top:20px;
            color:#888;
            font-size:14px;
        }
    </style>

</head>

<body>

<div class="container">

    <img src="dblogo.png" alt="Logo">

    <h1>Donation Box ERP</h1>

    <p>
        Inventory & Warehouse Management System
    </p>

    <a href="login.html" class="btn">
        Login System
    </a>

    <div class="version">
        Version 1.0.0
    </div>

</div>

</body>
</html>
