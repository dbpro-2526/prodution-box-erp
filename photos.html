<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Photos - Donation Box Inventory</title>
<link rel="icon" href="dblogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif}
:root{--primary:#0F4C81;--accent:#2563EB;--bg:#f0f4f9;--sidebar-bg:#0F4C81;--text-dark:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:14px;--radius-sm:10px;--transition:0.3s ease}
body{background:var(--bg);color:var(--text-dark);display:flex;min-height:100vh;overflow-x:hidden}
.sidebar{width:240px;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:1000;transition:transform var(--transition)}
.sidebar-brand{padding:18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-brand img{width:36px;height:36px;border-radius:8px}
.sidebar-brand h2{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sidebar-menu{padding:12px 10px;display:flex;flex-direction:column;gap:2px;flex-grow:1;overflow-y:auto}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;color:rgba(255,255,255,0.7);text-decoration:none;border-radius:var(--radius-sm);font-weight:500;font-size:13px;transition:all var(--transition);cursor:pointer}
.menu-item i{width:18px;text-align:center;font-size:14px}
.menu-item:hover{background:rgba(255,255,255,0.12);color:#fff}
.menu-item.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:600}
.sidebar-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,0.1)}
.btn-logout{width:100%;padding:10px;background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px}
.btn-logout:hover{background:rgba(239,68,68,0.35);color:#fff}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:1001;width:38px;height:38px;border-radius:10px;background:var(--sidebar-bg);color:#fff;border:none;font-size:16px;cursor:pointer;align-items:center;justify-content:center}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;opacity:0;transition:opacity var(--transition)}
.sidebar-overlay.show{opacity:1}
.main-content{margin-left:240px;width:calc(100% - 240px);padding:20px 24px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.top-bar-left h1{font-size:20px;font-weight:700;color:var(--primary)}
.dash-section{background:#fff;padding:18px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-header h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-header h2 i{color:var(--accent)}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.photo-card{border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;background:#fff;transition:box-shadow var(--transition);cursor:pointer}
.photo-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.photo-card img{width:100%;height:160px;object-fit:cover;display:block}
.photo-card .info{padding:8px 10px;font-size:11px;color:var(--text-muted)}
.photo-card .info strong{display:block;font-size:12px;color:var(--text-dark);margin-bottom:2px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state i{font-size:40px;margin-bottom:12px;opacity:0.3}
.img-viewer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:5000;justify-content:center;align-items:center;padding:20px;cursor:pointer}
.img-viewer-overlay.show{display:flex}
.img-viewer-wrap{position:relative;max-width:92vw;max-height:92vh;display:flex;flex-direction:column;align-items:center}
.img-viewer-wrap img{max-width:100%;max-height:85vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.4);cursor:default}
.img-viewer-close,.img-viewer-download{position:fixed;top:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.12);color:#fff;border:none;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:background 0.2s}
.img-viewer-close:hover,.img-viewer-download:hover{background:rgba(255,255,255,0.3)}
.img-viewer-close{right:16px}.img-viewer-download{right:66px}
.spinner-container{display:flex;align-items:center;justify-content:center;padding:60px 20px}
.spinner-container .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;background:var(--primary);color:#fff;padding:12px 20px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.15);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;z-index:3000;transform:translateY(80px);opacity:0;transition:var(--transition);max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.footer-text{text-align:center;font-size:11px;color:var(--text-muted);margin-top:24px;padding-bottom:10px}
@media(max-width:1024px){.main-content{padding:16px 18px}}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.hamburger{display:flex}.sidebar-overlay{display:block}
.main-content{margin-left:0;width:100%;padding:60px 12px 16px}.top-bar{flex-direction:column}.top-bar-left h1{font-size:17px}
.photo-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
@media(max-width:480px){.photo-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<button class="hamburger" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
<div class="sidebar-brand"><img src="dblogo.png" alt="Logo"><h2>Donation Box Inventory</h2></div>
<div class="sidebar-menu" id="dynamicSidebarMenu"><div class="menu-item active"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>
<div class="sidebar-footer"><button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
</div>

<div class="main-content">
<div class="top-bar">
<div class="top-bar-left"><h1>Photos</h1></div>
</div>

<div id="loadingSpinner" class="spinner-container"><div class="spinner"></div></div>

<div class="dash-section" id="contentSection" style="display:none">
<div class="section-header">
<h2><i class="fa-solid fa-images"></i> All Photos from Demands</h2>
<span style="font-size:11px;color:var(--text-muted)" id="photoCount">0 photos</span>
</div>
<div class="photo-grid" id="photoGrid">
<div class="empty-state"><i class="fa-solid fa-images"></i><p>No photos yet.</p></div>
</div>
</div>

<div class="footer-text">Donation Box Inventory | &copy; 2026</div>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-check-circle"></i><span id="toastMsg">Done</span></div>

<div class="img-viewer-overlay" id="imgViewer" onclick="closeImgViewer()">
<a class="img-viewer-download" id="imgDownloadBtn" href="#" target="_blank" title="Download" onclick="event.stopPropagation()"><i class="fa-solid fa-download"></i></a>
<button class="img-viewer-close" onclick="closeImgViewer()"><i class="fa-solid fa-xmark"></i></button>
<div class="img-viewer-wrap" onclick="event.stopPropagation()">
<img id="imgViewerSrc" src="" alt="Photo">
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
var firebaseConfig = {
apiKey: "AIzaSyDrblc5WOyRrSMRJdWIPm8DX2p-YSeS5MQ",
authDomain: "prodution-box-erp.firebaseapp.com",
projectId: "prodution-box-erp",
storageBucket: "prodution-box-erp.firebasestorage.app",
messagingSenderId: "426698063494",
appId: "1:426698063494:web:880dd323f24bd4121ddb07",
measurementId: "G-948852RZLB"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();
var currentUser = null;

function getDirectUrl(url) {
  if (!url) return url;
  var m = url.match(/\/file\/d\/([^/]+)/);
  if (m) return "https://drive.google.com/uc?export=view&id=" + m[1];
  m = url.match(/[?&]id=([^&]+)/);
  if (m && url.indexOf("drive.google.com") !== -1) return "https://drive.google.com/uc?export=view&id=" + m[1];
  return url;
}

function isPhotoUrl(url) {
  if (url.match(/^data:image/)) return true;
  var d = getDirectUrl(url);
  return d.match(/\.(jpg|jpeg|png|gif|webp|bmp|svg)(\?.*)?$/i) || d.indexOf("uc?export=view") !== -1;
}

function showToast(msg, icon) {
var t = document.getElementById('toast');
document.getElementById('toastMsg').textContent = msg;
t.querySelector('i').className = icon || 'fa-solid fa-check-circle';
t.classList.add('show');
setTimeout(function(){ t.classList.remove('show') }, 2500);
}

document.getElementById('hamburgerBtn').addEventListener('click', function(){
document.getElementById('sidebar').classList.toggle('open');
document.getElementById('sidebarOverlay').classList.toggle('show');
});
document.getElementById('sidebarOverlay').addEventListener('click', function(){
document.getElementById('sidebar').classList.remove('open');
document.getElementById('sidebarOverlay').classList.remove('show');
});

function mi(icon, label, href, active) {
return '<a' + (href ? ' href="' + href + '"' : '') + ' class="menu-item' + (active ? ' active' : '') + '"><i class="' + icon + '"></i> ' + label + '</a>';
}

function setupSidebar(user) {
var menu = document.getElementById('dynamicSidebarMenu');
var items = mi('fa-solid fa-chart-pie', 'Dashboard', 'dashboard.html');
if (["Super Admin", "Admin"].indexOf(user.role) !== -1) {
items += mi('fa-solid fa-cubes', 'Items', 'items.html');
items += mi('fa-solid fa-users-gear', 'User Management', 'users.html');
}
if (['Super Admin','Admin','Regional Manager','Regional Office','State Manager','State Office'].indexOf(user.role) !== -1) {
items += mi('fa-solid fa-warehouse', 'Warehouse', 'hubs.html');
}
items += mi('fa-solid fa-arrow-down-long', 'Stock IN', 'stock-in.html');
items += mi('fa-solid fa-arrow-up-long', 'Stock OUT', 'stock-out.html');
items += mi('fa-solid fa-file-signature', 'Demand', 'demand.html');
items += mi('fa-solid fa-images', 'Photos', 'photos.html', true);
menu.innerHTML = items;
}

document.getElementById('logoutBtn').addEventListener('click', function(){
localStorage.removeItem('userSession');
showToast('Logging out...');
setTimeout(function(){ window.location.href = 'login.html' }, 800);
});

function openImgViewer(url) {
document.getElementById("imgViewerSrc").src = url;
document.getElementById("imgDownloadBtn").href = url;
document.getElementById("imgViewer").classList.add("show");
document.body.style.overflow = "hidden";
}

function closeImgViewer() {
document.getElementById("imgViewer").classList.remove("show");
document.body.style.overflow = "";
}

document.addEventListener("keydown", function(e) {
if (e.key === "Escape") closeImgViewer();
});

async function loadPhotos() {
try {
var snap = await db.collection('demands').get();
var allPhotos = [];
var seen = {};
for (var i = 0; i < snap.docs.length; i++) {
var d = snap.docs[i].data();
    var src = d.attachmentData || d.attachmentUrl;
    if (src && (src.match(/^data:image/) || isPhotoUrl(src))) {
      var key = src;
      if (!seen[key]) {
        seen[key] = 0;
      }
      allPhotos.push({
        url: src,
        originalUrl: src,
        demandDate: d.date || '',
        demandEntity: d.requestingEntity || '',
        demandId: snap.docs[i].id
      });
    }
}
document.getElementById('photoCount').textContent = allPhotos.length + ' photos';
var grid = document.getElementById('photoGrid');
grid.innerHTML = '';
if (!allPhotos.length) {
grid.innerHTML = '<div class="empty-state"><i class="fa-solid fa-images"></i><p>No photos yet. Add photos in Demand form.</p></div>';
return;
}
for (var i = 0; i < allPhotos.length; i++) {
var p = allPhotos[i];
var card = document.createElement('div');
card.className = 'photo-card';
card.onclick = function(url) { return function(){ openImgViewer(url); }; }(p.url);
card.innerHTML = '<img src="' + esc(p.url) + '" alt="" loading="lazy"><div class="info"><strong>' + esc(p.demandEntity || 'Unknown') + '</strong>' + esc(p.demandDate || '') + '</div>';
grid.appendChild(card);
}
} catch(e) {
console.error(e);
document.getElementById('photoGrid').innerHTML = '<div class="empty-state"><i class="fa-solid fa-triangle-exclamation" style="color:#ef4444;opacity:0.8"></i><p>Error loading photos.</p></div>';
}
document.getElementById('loadingSpinner').style.display = 'none';
document.getElementById('contentSection').style.display = 'block';
}

function esc(s) {
if (!s) return "";
return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

window.addEventListener('DOMContentLoaded', async function(){
var userRaw = localStorage.getItem('userSession');
if (!userRaw) { showToast('Session invalid!', 'fa-solid fa-triangle-exclamation'); setTimeout(function(){ window.location.href = 'login.html' }, 1200); return; }
try { currentUser = JSON.parse(userRaw); } catch(e) { showToast('Session invalid!', 'fa-solid fa-triangle-exclamation'); setTimeout(function(){ window.location.href = 'login.html' }, 1200); return; }
if (!currentUser || !currentUser.role) { showToast('Session invalid!', 'fa-solid fa-triangle-exclamation'); setTimeout(function(){ window.location.href = 'login.html' }, 1200); return; }
setupSidebar(currentUser);
await loadPhotos();
});
</script>
</body>
</html>
