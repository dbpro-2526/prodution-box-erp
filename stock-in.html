<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Stock IN - Donation Box Inventory</title>
<link rel="icon" href="dblogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif}
:root{--primary:#0F4C81;--accent:#2563EB;--bg:#f0f4f9;--sidebar-bg:#0F4C81;--text-dark:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:14px;--radius-sm:10px;--transition:0.3s ease}
body{background:var(--bg);color:var(--text-dark);display:flex;min-height:100vh;overflow-x:hidden}
.sidebar{width:240px;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:1000;transition:transform var(--transition)}
.sidebar-brand{padding:18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-brand img{width:36px;height:36px;border-radius:8px}
.sidebar-brand h2{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sidebar-menu{padding:12px 10px;display:flex;flex-direction:column;gap:2px;flex-grow:1;overflow-y:auto}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;color:rgba(255,255,255,0.7);text-decoration:none;border-radius:var(--radius-sm);font-weight:500;font-size:13px;transition:all var(--transition);cursor:pointer}
.menu-item i{width:18px;text-align:center;font-size:14px}
.menu-item:hover{background:rgba(255,255,255,0.12);color:#fff}
.menu-item.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:600}
.sidebar-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,0.1)}
.btn-logout{width:100%;padding:10px;background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px}
.btn-logout:hover{background:rgba(239,68,68,0.35);color:#fff}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:1001;width:38px;height:38px;border-radius:10px;background:var(--sidebar-bg);color:#fff;border:none;font-size:16px;cursor:pointer;align-items:center;justify-content:center}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;opacity:0;transition:opacity var(--transition)}
.sidebar-overlay.show{display:block;opacity:1}
.main-content{margin-left:240px;width:calc(100% - 240px);padding:20px 24px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.top-bar-left h1{font-size:20px;font-weight:700;color:var(--primary)}
.user-info{display:flex;align-items:center;gap:10px;background:#fff;padding:6px 16px 6px 10px;border-radius:30px;border:1px solid var(--border);box-shadow:var(--shadow)}
.user-info .avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.user-info .name{font-size:13px;font-weight:600}
.user-info .desig{font-size:11px;color:var(--text-muted);background:#f1f5f9;padding:1px 8px;border-radius:8px}
.form-card{background:#fff;padding:24px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);max-width:800px;margin:0 auto 20px}
.form-card h2{font-size:16px;font-weight:600;color:var(--primary);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.form-card h2 i{color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{display:flex;flex-direction:column}
.form-group.full{grid-column:1/-1}
.form-group label{font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:4px}
.form-group label .required{color:#ef4444}
.form-group input,.form-group select,.form-group textarea{padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;background:#fff;transition:border-color var(--transition)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group input:disabled,.form-group select:disabled{background:#f1f5f9;cursor:not-allowed;opacity:0.7}
.form-group textarea{resize:vertical;min-height:80px}
.form-group .error-text{font-size:11px;color:#ef4444;margin-top:3px;display:none}
.form-group .lock-badge{font-size:10px;color:var(--text-muted);margin-top:2px;display:block}
.form-group input.error,.form-group select.error{border-color:#ef4444}
.btn-submit{grid-column:1/-1;padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background var(--transition);margin-top:4px}
.btn-submit:hover{background:#1d4ed8}
.btn-submit:disabled{opacity:0.6;cursor:not-allowed}
.dash-section{background:#fff;padding:18px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-header h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-header h2 i{color:var(--accent)}
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:700px}
th{background:#f8fafc;padding:10px 12px;color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcff}
.action-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:4px}
.action-btn.edit{background:#dbeafe;color:#2563eb}.action-btn.edit:hover{background:#bfdbfe}
.action-btn.delete{background:#fee2e2;color:#dc2626}.action-btn.delete:hover{background:#fecaca}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state i{font-size:36px;margin-bottom:10px;opacity:0.3}
.spinner-container{display:flex;align-items:center;justify-content:center;padding:60px 20px}
.spinner-container .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer-text{text-align:center;font-size:11px;color:var(--text-muted);margin-top:24px;padding-bottom:10px}
.toast{position:fixed;bottom:20px;right:20px;background:var(--primary);color:#fff;padding:12px 20px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.15);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;z-index:3000;transform:translateY(80px);opacity:0;transition:var(--transition);max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:#dc2626}
.toast.success{background:var(--primary)}
.float-add-btn{position:fixed;top:82px;right:24px;z-index:500;width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,0.4);transition:all var(--transition);display:flex;align-items:center;justify-content:center}
.float-add-btn:hover{transform:scale(1.08);background:#1d4ed8}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 16px}
.modal-overlay.show{display:flex}
.modal-container{background:#fff;border-radius:var(--radius);max-width:820px;width:100%;margin:auto;box-shadow:0 12px 48px rgba(0,0,0,0.2);animation:modalIn .2s ease;position:relative}
@keyframes modalIn{from{opacity:0;transform:translateY(-20px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 24px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:16px;font-weight:600;color:var(--primary);display:flex;align-items:center;gap:8px}
.modal-header h2 i{color:var(--accent)}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:#f1f5f9;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--text-muted);transition:all var(--transition);flex-shrink:0}
.modal-close:hover{background:#e2e8f0;color:var(--text-dark)}
.modal-body{padding:20px 24px 24px}
.modal-body .form-card{box-shadow:none;margin:0;padding:0;border:none;border-radius:0}
.btn-action{padding:6px 14px;border:none;border-radius:8px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;transition:background var(--transition);white-space:nowrap}
.btn-action:hover{background:#1d4ed8}

@media(max-width:768px){.float-add-btn{top:60px;right:12px;width:40px;height:40px;font-size:16px}.modal-overlay{padding:16px 8px;align-items:center}.modal-body{padding:16px}.modal-container{margin:auto 4px}.modal-header{padding:12px 16px}.modal-header h2{font-size:14px}}

@media(max-width:1024px){.main-content{padding:16px 18px}}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.hamburger{display:flex}.sidebar-overlay{display:block}
.main-content{margin-left:0;width:100%;padding:60px 12px 16px}.top-bar{flex-direction:column;gap:6px}
.form-grid{grid-template-columns:1fr}.form-card{padding:16px}.dash-section{padding:12px}table{min-width:550px}th,td{padding:6px 6px;font-size:11px}.action-btn{padding:3px 6px;font-size:10px}.toast{left:12px;right:12px;bottom:12px;max-width:none}.section-header{flex-direction:column;align-items:stretch;gap:6px}.section-header h2{font-size:14px}}
@media(max-width:480px){.form-card{padding:12px}}
</style>
</head>
<body>
<button class="hamburger" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
<div class="sidebar-brand"><img src="dblogo.png" alt="Logo"><h2>Donation Box Inventory</h2></div>
<div class="sidebar-menu" id="dynamicSidebarMenu"><div class="menu-item active"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>
<div class="sidebar-footer"><button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
</div>

<div class="main-content">
<div class="top-bar">
<div class="top-bar-left"><h1>Stock IN</h1></div>
<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
<div class="user-info">
<div class="avatar" id="userAvatar">U</div>
<span class="name" id="adminName">Loading...</span>
<span class="desig" id="userRoleBadge">&mdash;</span>
</div>
</div>
</div>

<div id="loadingSpinner" class="spinner-container"><div class="spinner"></div></div>

<div id="formContent" style="display:none">

<div class="dash-section">
<div class="section-header">
<h2><i class="fa-solid fa-clock-rotate-left"></i> Stock IN History</h2>
<div style="display:flex;align-items:center;gap:8px">
<button class="btn-action" onclick="document.getElementById('addEntryBtn').click()" style="font-size:12px;padding:6px 14px"><i class="fa-solid fa-plus"></i> Add Stock IN</button>
<button class="btn-action" onclick="exportExcel()" style="font-size:12px;padding:6px 14px;background:#059669;color:#fff"><i class="fa-solid fa-file-excel"></i> Excel</button>
<span style="font-size:11px;color:var(--text-muted)" id="historyCount">0 entries</span>
</div>
    </div>
<div style="margin-bottom:10px">
<input type="text" id="filterSearch" placeholder="Search..." oninput="applyFilters()" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;box-sizing:border-box">
</div>
<div class="table-wrap">
<table>
<thead>
                        <tr><th>Date</th><th>Item</th><th>Qty</th><th>Unit</th><th>Source</th><th>Division</th><th>Hub</th><th>Entered By</th><th>Notes</th><th>Actions</th></tr>
                </thead>
                <tbody id="historyBody"><tr><td colspan="10"><div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading...</p></div></td></tr></tbody>
</table>
</div>
</div>

<div class="footer-text">Donation Box Inventory | &copy; 2026</div>
<button class="float-add-btn" id="addEntryBtn" title="Add Stock IN Entry"><i class="fa-solid fa-plus"></i></button>
</div>

<div class="modal-overlay" id="entryModal">
<div class="modal-container">
<div class="modal-header">
<h2><i class="fa-solid fa-arrow-down-long"></i> New Stock IN Entry</h2>
<button class="modal-close" id="modalCloseBtn" type="button"><i class="fa-solid fa-xmark"></i></button>
</div>
<div class="modal-body">
<div class="form-card">
<form id="stockInForm" autocomplete="off">
<div class="form-grid">
<div class="form-group">
<label>Date</label>
<input type="date" id="fieldDate" required>
</div>
                <div class="form-group">
                        <label>Item Name <span class="required">*</span></label>
                        <select id="fieldItemName" required><option value="">Select Item</option></select>
                        <span class="error-text" id="errorItemName">Item name is required</span>
                </div>
<div class="form-group">
<label>Quantity <span class="required">*</span></label>
<input type="number" id="fieldQuantity" placeholder="0" min="1" step="1" required>
<span class="error-text" id="errorQuantity">Quantity is required</span>
</div>
<div class="form-group">
<label>Unit</label>
<select id="fieldUnit">
<option value="Box">Box</option>
<option value="Packet">Packet</option>
<option value="Piece" selected>Piece</option>
<option value="Kg">Kg</option>
<option value="Liter">Liter</option>
<option value="Bag">Bag</option>
<option value="Carton">Carton</option>
<option value="Set">Set</option>
<option value="Pair">Pair</option>
<option value="Dozen">Dozen</option>
</select>
</div>
<div class="form-group">
<label>Region</label>
<select id="fieldRegion"><option value="">Loading...</option></select>
<span class="lock-badge" id="lockRegion"></span>
</div>
<div class="form-group">
<label>State</label>
<select id="fieldState"><option value="">Select region first</option></select>
<span class="lock-badge" id="lockState"></span>
</div>
<div class="form-group">
<label>Division</label>
<select id="fieldDivision"><option value="">Select state first</option></select>
<span class="lock-badge" id="lockDivision"></span>
</div>
<div class="form-group">
<label>Source / Supplier</label>
<input type="text" id="fieldSource" placeholder="e.g. Donor, Supplier name">
</div>
<div class="form-group">
<label>Hub / Warehouse</label>
<select id="fieldHub"><option value="">Loading...</option></select>
<span class="lock-badge" id="lockHub"></span>
</div>
<div class="form-group full">
<label>Notes</label>
<textarea id="fieldNotes" placeholder="Optional notes..."></textarea>
</div>
<button type="submit" class="btn-submit" id="submitBtn"><i class="fa-solid fa-floppy-disk"></i> Save Stock IN</button>
</div>
</form>
</div>
</div>
</div>
</div>

</div>

<div class="toast" id="toast"><i class="fa-solid fa-check-circle"></i><span id="toastMsg">Done</span></div>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyDrblc5WOyRrSMRJdWIPm8DX2p-YSeS5MQ",
    authDomain: "prodution-box-erp.firebaseapp.com",
    projectId: "prodution-box-erp",
    storageBucket: "prodution-box-erp.firebasestorage.app",
    messagingSenderId: "426698063494",
    appId: "1:426698063494:web:880dd323f24bd4121ddb07",
    measurementId: "G-948852RZLB"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var currentUser = null;
var allHubs = [];
var allEntries = [];
var filteredEntries = [];
var isSubmitting = false;
var regionsCache = [];
var allItems = [];
var editId = null;

function showToast(msg, type) {
    var t = document.getElementById("toast");
    document.getElementById("toastMsg").textContent = msg;
    t.className = "toast" + (type === "error" ? " error" : type === "success" ? " success" : "");
    t.querySelector("i").className = type === "error" ? "fa-solid fa-circle-exclamation" : "fa-solid fa-check-circle";
    t.classList.add("show");
    setTimeout(function(){ t.classList.remove("show") }, 2500);
}

function getInitials(n) {
    return n ? n.split(" ").map(function(w){ return w[0] }).join("").toUpperCase().slice(0, 2) : "U";
}

function populateSelect(sel, items, ph) {
    sel.innerHTML = '<option value="">' + (ph || "Select") + '</option>';
    for (var i = 0; i < items.length; i++) {
        var o = document.createElement("option");
        o.value = items[i];
        o.textContent = items[i];
        sel.appendChild(o);
    }
}

function lockField(selId, lockId, val, label) {
    var s = document.getElementById(selId);
    var b = document.getElementById(lockId);
    if (val) {
        s.value = val;
        s.disabled = true;
        b.textContent = "Locked: " + label + " = " + val;
    } else {
        s.disabled = false;
        b.textContent = "";
    }
}

document.getElementById("hamburgerBtn").addEventListener("click", function() {
    document.getElementById("sidebar").classList.toggle("open");
    document.getElementById("sidebarOverlay").classList.toggle("show");
});
document.getElementById("sidebarOverlay").addEventListener("click", function() {
    document.getElementById("sidebar").classList.remove("open");
    document.getElementById("sidebarOverlay").classList.remove("show");
});

function buildSidebar(role) {
    var menu = document.getElementById("dynamicSidebarMenu");
    var items = [];
    items.push({ icon: "fa-solid fa-chart-pie", label: "Dashboard", href: "dashboard.html", active: false });
    if (["Super Admin", "Admin"].indexOf(role) !== -1) {
        items.push({ icon: "fa-solid fa-cubes", label: "Items", href: "items.html", active: false });
        items.push({ icon: "fa-solid fa-users", label: "User Management", href: "users.html", active: false });
    }
    if (["Super Admin", "Admin", "Regional Manager", "Regional Office", "State Manager", "State Office"].indexOf(role) !== -1) {
        items.push({ icon: "fa-solid fa-warehouse", label: "Warehouse", href: "hubs.html", active: false });
    }
    items.push({ icon: "fa-solid fa-arrow-down-long", label: "Stock IN", href: "stock-in.html", active: true });
    items.push({ icon: "fa-solid fa-arrow-up-long", label: "Stock OUT", href: "stock-out.html", active: false });
    items.push({ icon: "fa-solid fa-file-signature", label: "Demand", href: "demand.html", active: false });
    var html = "";
    for (var i = 0; i < items.length; i++) {
        html += '<a href="' + items[i].href + '" class="menu-item' + (items[i].active ? " active" : "") + '"><i class="' + items[i].icon + '"></i> ' + items[i].label + '</a>';
    }
    menu.innerHTML = html;
}

async function loadRegions() {
    try {
        var snap = await db.collection("regions").get();
        if (!snap.empty) {
            regionsCache = snap.docs.map(function(d){ return (d.data().name || d.id) }).filter(Boolean);
            regionsCache = [...new Set(regionsCache)].sort();
        }
    } catch(e) { console.warn("regions fallback", e); }
    if (regionsCache.length === 0) {
        regionsCache = [...new Set(allHubs.map(function(h){ return h.region }).filter(Boolean))].sort();
    }
    return regionsCache;
}

async function loadStates(region) {
    var states = [];
    try {
        var snap = await db.collection("states").where("region", "==", region).get();
        if (!snap.empty) {
            states = snap.docs.map(function(d){ return (d.data().name || d.id) }).filter(Boolean);
        }
    } catch(e) { console.warn("states fallback", e); }
    if (states.length === 0) {
        states = [...new Set(allHubs.filter(function(h){ return h.region === region }).map(function(h){ return h.state }).filter(Boolean))].sort();
    }
    return [...new Set(states)].sort();
}

async function loadDivisions(state) {
    var divisions = [];
    try {
        var snap = await db.collection("divisions").where("state", "==", state).get();
        if (!snap.empty) {
            divisions = snap.docs.map(function(d){ return (d.data().name || d.id) }).filter(Boolean);
        }
    } catch(e) { console.warn("divisions fallback", e); }
    if (divisions.length === 0) {
        divisions = [...new Set(allHubs.filter(function(h){ return h.state === state }).map(function(h){ return h.division }).filter(Boolean))].sort();
    }
    return [...new Set(divisions)].sort();
}

async function loadHubs() {
    try {
        var snap = await db.collection("hubs").get();
        allHubs = snap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()) });
    } catch(e) { console.error("Error loading hubs", e); }
    return allHubs;
}

async function loadItems() {
    try {
        var snap = await db.collection("items").get();
        allItems = [];
        snap.forEach(function(d){ allItems.push(Object.assign({id: d.id}, d.data())) });
        allItems.sort(function(a, b){ return (a.name || '').localeCompare(b.name || '') });
    } catch(e) { console.error("Error loading items", e); }
}

function populateItemDropdown() {
    var sel = document.getElementById("fieldItemName");
    sel.innerHTML = '<option value="">Select Item</option>';
    for (var i = 0; i < allItems.length; i++) {
        var o = document.createElement("option");
        o.value = allItems[i].name;
        o.textContent = allItems[i].name + (allItems[i].unit ? " (" + allItems[i].unit + ")" : "");
        o.setAttribute("data-unit", allItems[i].unit || "");
        sel.appendChild(o);
    }
}

function onItemChange() {
    var sel = document.getElementById("fieldItemName");
    var unitSel = document.getElementById("fieldUnit");
    if (sel.selectedIndex > 0) {
        var unit = sel.options[sel.selectedIndex].getAttribute("data-unit");
        if (unit) unitSel.value = unit;
    }
}

async function onRegionChange() {
    var region = document.getElementById("fieldRegion").value;
    var stateSel = document.getElementById("fieldState");
    var divSel = document.getElementById("fieldDivision");
    stateSel.innerHTML = '<option value="">Select</option>';
    divSel.innerHTML = '<option value="">Select</option>';
    divSel.disabled = true;
    if (!region) { stateSel.disabled = false; return; }
    stateSel.disabled = false;
    var states = await loadStates(region);
    populateSelect(stateSel, states, "Select state");
    if (currentUser && currentUser.state && states.indexOf(currentUser.state) !== -1) {
        stateSel.value = currentUser.state;
        stateSel.disabled = true;
        document.getElementById("lockState").textContent = "Locked: State = " + currentUser.state;
        await onStateChange();
    }
}

async function onStateChange() {
    var state = document.getElementById("fieldState").value;
    var divSel = document.getElementById("fieldDivision");
    divSel.innerHTML = '<option value="">Select</option>';
    if (!state) { divSel.disabled = false; return; }
    divSel.disabled = false;
    var divisions = await loadDivisions(state);
    populateSelect(divSel, divisions, "Select division");
    if (currentUser && currentUser.division && divisions.indexOf(currentUser.division) !== -1) {
        divSel.value = currentUser.division;
        divSel.disabled = true;
        document.getElementById("lockDivision").textContent = "Locked: Division = " + currentUser.division;
    }
}

function getHubInfo(name) {
    if (!name || !allHubs.length) return null;
    for (var i = 0; i < allHubs.length; i++) {
        if (allHubs[i].name === name || allHubs[i].hubName === name) return allHubs[i];
    }
    return null;
}

function inScope(e) {
    if (!currentUser || ["Super Admin","Admin"].indexOf(currentUser.role) !== -1) return true;
    if (currentUser.division) return e.division === currentUser.division || (getHubInfo(e.hub || e.hubName) || {}).division === currentUser.division;
    if (currentUser.state) return e.state === currentUser.state || (getHubInfo(e.hub || e.hubName) || {}).state === currentUser.state;
    if (currentUser.region) return e.region === currentUser.region || (getHubInfo(e.hub || e.hubName) || {}).region === currentUser.region;
    var h = currentUser.hub || currentUser.warehouse;
    if (h) return e.hub === h || e.hubName === h;
    return false;
}

async function loadHistory() {
    try {
        var query = db.collection("stock_ledger").where("type", "==", "IN");
        if (currentUser && ["Regional Manager","Regional Office","State Manager","State Office","Division Manager"].indexOf(currentUser.role) !== -1) {
            if (currentUser.division) query = query.where("division", "==", currentUser.division);
        }
        var snap = await query.orderBy("date", "desc").limit(200).get();
        allEntries = snap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()) }).filter(inScope);
        applyFilters();
    } catch(e) {
        console.error("Error loading history", e);
        try {
            var snap = await db.collection("stock_ledger").get();
            allEntries = [];
            var docs = snap.docs;
            for (var i = 0; i < docs.length; i++) {
                var data = docs[i].data();
                if (data && (data.type || "IN").toUpperCase() === "IN" && inScope(data)) {
                    allEntries.push(Object.assign({id: docs[i].id}, data));
                }
            }
            allEntries.sort(function(a, b){ return (b.date || "").localeCompare(a.date || "") });
            applyFilters();
        } catch(e2) {
            console.error("Fallback load error", e2);
            document.getElementById("historyBody").innerHTML = '<tr><td colspan="10"><div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>Error loading history</p></div></td></tr>';
        }
    }
}

function canEdit(entry) {
    if (!currentUser) return false;
    if (["Super Admin", "Admin"].indexOf(currentUser.role) !== -1) return true;
    if (["Regional Office", "State Office"].indexOf(currentUser.role) !== -1) return true;
    return false;
}

function canDelete(entry) {
    return canEdit(entry);
}

async function deleteEntry(id) {
    if (!confirm("Delete this stock IN entry permanently?")) return;
    try {
        await db.collection("stock_ledger").doc(id).delete();
        showToast("Entry deleted!", "success");
        await loadHistory();
    } catch(e) { console.error(e); showToast("Error: " + e.message, "error"); }
}

function editEntry(id) {
    var entry = null;
    for (var i = 0; i < allEntries.length; i++) { if (allEntries[i].id === id) { entry = allEntries[i]; break; } }
    if (!entry) return;
    editId = id;
    document.getElementById("fieldDate").value = entry.date || "";
    document.getElementById("fieldItemName").value = entry.itemName || "";
    if (entry.unit) document.getElementById("fieldUnit").value = entry.unit;
    document.getElementById("fieldQuantity").value = entry.quantity || "";
    document.getElementById("fieldSource").value = entry.source || entry.supplier || "";
    document.getElementById("fieldNotes").value = entry.notes || "";
    if (!document.getElementById("fieldRegion").disabled && entry.region) document.getElementById("fieldRegion").value = entry.region;
    if (!document.getElementById("fieldHub").disabled && entry.hub) document.getElementById("fieldHub").value = entry.hub || entry.hubName || "";
    if (entry.region) { onRegionChange(); setTimeout(function(){ if (!document.getElementById("fieldState").disabled && entry.state) document.getElementById("fieldState").value = entry.state; if (entry.state) { onStateChange(); setTimeout(function(){ if (!document.getElementById("fieldDivision").disabled && entry.division) document.getElementById("fieldDivision").value = entry.division; }, 300); } }, 300); }
    document.getElementById("submitBtn").innerHTML = '<i class="fa-solid fa-pen-to-square"></i> Update Stock IN';
    openModal();
}

function applyFilters() {
    var q = document.getElementById("filterSearch").value.toLowerCase().trim();
    if (!q) { filteredEntries = []; renderHistory(); return; }
    filteredEntries = allEntries.filter(function(e) {
        var text = "";
        for (var key in e) {
            if (typeof e[key] === "string") text += " " + e[key].toLowerCase();
        }
        return text.indexOf(q) !== -1;
    });
    renderHistory();
}

function renderHistory() {
    var list = filteredEntries.length ? filteredEntries : allEntries;
    var tb = document.getElementById("historyBody");
    document.getElementById("historyCount").textContent = list.length + " entries";
    tb.innerHTML = "";
    if (!list.length) {
        tb.innerHTML = '<tr><td colspan="10"><div class="empty-state"><i class="fa-solid fa-clock-rotate-left"></i><p>No stock IN entries yet.</p></div></td></tr>';
        return;
    }
    for (var i = 0; i < list.length; i++) {
        var e = list[i];
        var editBtn = canEdit(e) ? '<button class="action-btn edit" onclick="editEntry(\'' + escAttr(e.id) + '\')"><i class="fa-solid fa-pen-to-square"></i></button>' : "";
        var delBtn = canDelete(e) ? '<button class="action-btn delete" onclick="deleteEntry(\'' + escAttr(e.id) + '\')"><i class="fa-solid fa-trash-can"></i></button>' : "";
        var actHtml = (editBtn || delBtn) ? '<span style="display:inline-flex;gap:4px">' + editBtn + delBtn + '</span>' : "-";
        tb.innerHTML += "<tr><td>" + esc(e.date || "-") + '</td><td><strong>' + esc(e.itemName || "-") + '</strong></td><td style="font-weight:600;color:#059669">' + (e.quantity || 0) + '</td><td>' + esc(e.unit || "-") + '</td><td>' + esc(e.source || e.supplier || "-") + '</td><td>' + esc(e.division || "-") + '</td><td>' + esc(e.hub || e.hubName || "-") + '</td><td><div>' + (esc(e.createdBy) || "-") + '</div>' + (fmtTime(e.createdAt) ? '<div style="font-size:10px;color:var(--text-muted);line-height:1.2">' + fmtTime(e.createdAt) + '</div>' : "") + '</td><td>' + esc(e.notes || "-") + '</td><td>' + actHtml + "</td></tr>";
    }
}

function exportExcel() {
    if (!allEntries.length) { showToast("No data to export", "error"); return; }
    var wsData = [["Date","Item","Qty","Unit","Source","Division","Hub","Entered By","Notes"]];
    for (var i = 0; i < allEntries.length; i++) {
        var e = allEntries[i];
        wsData.push([e.date||"-", e.itemName||"-", e.quantity||0, e.unit||"-", e.source||e.supplier||"-", e.division||"-", e.hub||e.hubName||"-", e.createdBy||"-", e.notes||"-"]);
    }
    var wb = XLSX.utils.book_new();
    var ws = XLSX.utils.aoa_to_sheet(wsData);
    XLSX.utils.book_append_sheet(wb, ws, "StockIN");
    XLSX.writeFile(wb, "stock_in_export.xlsx");
}

function fmtTime(ts) {
    if (!ts) return "";
    var d = ts.toDate ? ts.toDate() : new Date(ts);
    if (isNaN(d.getTime())) return "";
    var dd = String(d.getDate()).padStart(2,"0");
    var mm = String(d.getMonth()+1).padStart(2,"0");
    var yyyy = d.getFullYear();
    var hh = String(d.getHours()).padStart(2,"0");
    var mi = String(d.getMinutes()).padStart(2,"0");
    return dd + "/" + mm + "/" + yyyy + " " + hh + ":" + mi;
}

function escAttr(s) {
    if (!s) return "";
    return s.replace(/'/g,"\\'").replace(/"/g,'\\"');
}

function esc(s) {
    if (!s) return "";
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function openModal() {
    document.getElementById("entryModal").classList.add("show");
    document.body.style.overflow = "hidden";
}

function closeModal() {
    document.getElementById("entryModal").classList.remove("show");
    document.body.style.overflow = "";
    if (editId) {
        editId = null;
        document.getElementById("submitBtn").innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Stock IN';
    }
}

async function initForm() {
    var regionSel = document.getElementById("fieldRegion");
    var stateSel = document.getElementById("fieldState");
    var divSel = document.getElementById("fieldDivision");
    var hubSel = document.getElementById("fieldHub");

    document.getElementById("fieldDate").value = new Date().toISOString().split("T")[0];
    await loadHubs();
    await loadItems();
    populateItemDropdown();
    document.getElementById("fieldItemName").addEventListener("change", onItemChange);
    var regions = await loadRegions();
    populateSelect(regionSel, regions, "Select region");
    var hubNames = [...new Set(allHubs.map(function(h){ return h.name || h.hubName }).filter(Boolean))].sort();
    populateSelect(hubSel, hubNames, "Select hub");

    lockField("fieldRegion", "lockRegion", currentUser.region, "Region");
    lockField("fieldHub", "lockHub", currentUser.hub || currentUser.warehouse, "Hub");

    if (currentUser && currentUser.region && regionSel.disabled) {
        regionSel.value = currentUser.region;
        var states = await loadStates(currentUser.region);
        populateSelect(stateSel, states, "Select state");
        if (currentUser.state && states.indexOf(currentUser.state) !== -1) {
            stateSel.value = currentUser.state;
            stateSel.disabled = true;
            document.getElementById("lockState").textContent = "Locked: State = " + currentUser.state;
            var divisions = await loadDivisions(currentUser.state);
            populateSelect(divSel, divisions, "Select division");
            if (currentUser.division && divisions.indexOf(currentUser.division) !== -1) {
                divSel.value = currentUser.division;
                divSel.disabled = true;
                document.getElementById("lockDivision").textContent = "Locked: Division = " + currentUser.division;
            }
        }
    }

    regionSel.addEventListener("change", onRegionChange);
    stateSel.addEventListener("change", onStateChange);

    document.getElementById("loadingSpinner").style.display = "none";
    document.getElementById("formContent").style.display = "block";

    await loadHistory();
}

document.getElementById("stockInForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    if (isSubmitting) return;
    var itemName = document.getElementById("fieldItemName").value.trim();
    var quantity = document.getElementById("fieldQuantity").value.trim();
    var valid = true;

    document.getElementById("fieldItemName").classList.remove("error");
    document.getElementById("errorItemName").style.display = "none";
    document.getElementById("fieldQuantity").classList.remove("error");
    document.getElementById("errorQuantity").style.display = "none";

    if (!itemName) { document.getElementById("fieldItemName").classList.add("error"); document.getElementById("errorItemName").style.display = "block"; valid = false; }
    if (!quantity || parseInt(quantity) < 1) { document.getElementById("fieldQuantity").classList.add("error"); document.getElementById("errorQuantity").style.display = "block"; valid = false; }
    if (!valid) return;

    isSubmitting = true;
    var btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';

    try {
        var data = {
            date: document.getElementById("fieldDate").value,
            itemName: itemName,
            quantity: parseInt(quantity),
            unit: document.getElementById("fieldUnit").value,
            region: document.getElementById("fieldRegion").value || "",
            state: document.getElementById("fieldState").value || "",
            division: document.getElementById("fieldDivision").value || "",
            source: document.getElementById("fieldSource").value.trim() || "",
            hub: document.getElementById("fieldHub").value || "",
            notes: document.getElementById("fieldNotes").value.trim() || "",
            type: "IN",
            createdBy: (currentUser && currentUser.fullName) || "Unknown",
            role: (currentUser && currentUser.role) || ""
        };
        if (editId) {
            data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
            data.updatedBy = (currentUser && currentUser.fullName) || "Unknown";
            await db.collection("stock_ledger").doc(editId).update(data);
            showToast("Stock IN updated!", "success");
            editId = null;
            document.getElementById("submitBtn").innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Stock IN';
        } else {
            data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection("stock_ledger").add(data);
            showToast("Stock IN saved!", "success");
        }

        document.getElementById("fieldItemName").value = "";
        document.getElementById("fieldQuantity").value = "";
        document.getElementById("fieldUnit").value = "Piece";
        document.getElementById("fieldSource").value = "";
        document.getElementById("fieldNotes").value = "";
        if (!document.getElementById("fieldRegion").disabled) {
            document.getElementById("fieldRegion").value = "";
            document.getElementById("fieldState").innerHTML = '<option value="">Select region first</option>';
            document.getElementById("fieldDivision").innerHTML = '<option value="">Select state first</option>';
        }
        if (!document.getElementById("fieldHub").disabled) {
            document.getElementById("fieldHub").value = "";
        }
        await loadHistory();
        closeModal();
    } catch (err) {
        console.error("Save error:", err);
        showToast("Error: " + (err.message || "Unknown"), "error");
    } finally {
        isSubmitting = false;
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Stock IN';
    }
});

document.getElementById("logoutBtn").addEventListener("click", function() {
    localStorage.removeItem("userSession");
    showToast("Logging out...");
    setTimeout(function(){ window.location.href = "login.html" }, 800);
});

window.addEventListener("DOMContentLoaded", async function() {
    var userRaw = localStorage.getItem("userSession");
    if (!userRaw) { showToast("Session invalid!", "error"); setTimeout(function(){ window.location.href = "login.html" }, 1200); return; }
    try { currentUser = JSON.parse(userRaw); } catch(e) { showToast("Session invalid!", "error"); setTimeout(function(){ window.location.href = "login.html" }, 1200); return; }
    if (!currentUser || !currentUser.role) { showToast("Session invalid!", "error"); setTimeout(function(){ window.location.href = "login.html" }, 1200); return; }
    document.getElementById("userAvatar").textContent = getInitials(currentUser.fullName);
    document.getElementById("adminName").innerText = currentUser.fullName || "User";
    document.getElementById("userRoleBadge").innerText = currentUser.role || "-";
    buildSidebar(currentUser.role);
    await initForm();
});

document.getElementById("addEntryBtn").addEventListener("click", function() {
    editId = null;
    document.getElementById("submitBtn").innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Stock IN';
    document.getElementById("fieldItemName").value = "";
    document.getElementById("fieldQuantity").value = "";
    document.getElementById("fieldUnit").value = "Piece";
    document.getElementById("fieldSource").value = "";
    document.getElementById("fieldNotes").value = "";
    document.getElementById("fieldDate").value = new Date().toISOString().split("T")[0];
    document.getElementById("fieldItemName").classList.remove("error");
    document.getElementById("errorItemName").style.display = "none";
    document.getElementById("fieldQuantity").classList.remove("error");
    document.getElementById("errorQuantity").style.display = "none";
    openModal();
});

document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
document.getElementById("entryModal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
});
</script>
