<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>User Management - Donation Box Inventory</title>
<link rel="icon" href="dblogo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins",sans-serif}
:root{--primary:#0F4C81;--accent:#2563EB;--bg:#f0f4f9;--sidebar-bg:#0F4C81;--text-dark:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:14px;--radius-sm:10px;--transition:0.3s ease}
body{background:var(--bg);color:var(--text-dark);display:flex;min-height:100vh;overflow-x:hidden}
.sidebar{width:240px;background:var(--sidebar-bg);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:1000;transition:transform var(--transition)}
.sidebar-brand{padding:18px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,0.1)}
.sidebar-brand img{width:36px;height:36px;border-radius:8px}
.sidebar-brand h2{font-size:13px;font-weight:600;color:#fff;line-height:1.3}
.sidebar-menu{padding:12px 10px;display:flex;flex-direction:column;gap:2px;flex-grow:1;overflow-y:auto}
.menu-item{display:flex;align-items:center;gap:10px;padding:10px 12px;color:rgba(255,255,255,0.7);text-decoration:none;border-radius:var(--radius-sm);font-weight:500;font-size:13px;transition:all var(--transition);cursor:pointer}
.menu-item i{width:18px;text-align:center;font-size:14px}
.menu-item:hover{background:rgba(255,255,255,0.12);color:#fff}
.menu-item.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:600}
.sidebar-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,0.1)}
.btn-logout{width:100%;padding:10px;background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.25);border-radius:var(--radius-sm);font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px}
.btn-logout:hover{background:rgba(239,68,68,0.35);color:#fff}
.hamburger{display:none;position:fixed;top:10px;left:10px;z-index:1001;width:38px;height:38px;border-radius:10px;background:var(--sidebar-bg);color:#fff;border:none;font-size:16px;cursor:pointer;align-items:center;justify-content:center}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;opacity:0;transition:opacity var(--transition)}
.sidebar-overlay.show{opacity:1}
.main-content{margin-left:240px;width:calc(100% - 240px);padding:20px 24px;min-height:100vh}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.top-bar-left h1{font-size:20px;font-weight:700;color:var(--primary)}
.user-info{display:flex;align-items:center;gap:10px;background:#fff;padding:6px 16px 6px 10px;border-radius:30px;border:1px solid var(--border);box-shadow:var(--shadow)}
.user-info .avatar{width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.user-info .name{font-size:13px;font-weight:600}
.user-info .desig{font-size:11px;color:var(--text-muted);background:#f1f5f9;padding:1px 8px;border-radius:8px}
.dash-section{background:#fff;padding:18px;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:16px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.section-header h2{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-header h2 i{color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:2px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:3px}
.form-group .required{color:#ef4444}
.form-group input,.form-group select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none;background:#fff;transition:border-color var(--transition)}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group input:disabled,.form-group select:disabled{background:#f1f5f9;cursor:not-allowed;opacity:0.7}
.password-wrapper{display:flex;align-items:center;position:relative}
.password-wrapper input{padding-right:36px}
.password-wrapper .pwd-toggle{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:14px;padding:4px}
.password-wrapper .pwd-toggle:hover{color:var(--text-dark)}
.form-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.form-actions button{padding:9px 20px;border-radius:var(--radius-sm);font-weight:500;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;border:none}
.btn-action{background:var(--accent);color:#fff}
.btn-action:hover{background:#1d4ed8}
.btn-action-secondary{background:#fff;color:var(--text-dark);border:1px solid var(--border)}
.btn-action-secondary:hover{background:#f8fafc}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626}
.table-toolbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.table-toolbar .search-wrap{flex:1;min-width:160px;position:relative}
.table-toolbar .search-wrap input{width:100%;padding:8px 10px 8px 32px;border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none;background:#fff}
.table-toolbar .search-wrap input:focus{border-color:var(--accent)}
.table-toolbar .search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px}
.table-toolbar select{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none;background:#fff;min-width:130px}
.table-toolbar select:focus{border-color:var(--accent)}
.table-wrap{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:800px}
th{background:#f8fafc;padding:10px 12px;color:var(--text-muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.3px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcff}
.status-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.status-active{background:#d1fae5;color:#059669}
.status-inactive{background:#fee2e2;color:#dc2626}
.action-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:4px}
.action-btn.edit{background:#dbeafe;color:#2563eb}
.action-btn.edit:hover{background:#bfdbfe}
.action-btn.delete{background:#fee2e2;color:#dc2626}
.action-btn.delete:hover{background:#fecaca}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted)}
.empty-state i{font-size:36px;margin-bottom:10px;opacity:0.3}
.toast{position:fixed;bottom:20px;right:20px;background:var(--primary);color:#fff;padding:12px 20px;border-radius:10px;box-shadow:0 6px 24px rgba(0,0,0,0.15);font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;z-index:3000;transform:translateY(80px);opacity:0;transition:var(--transition);max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.debug-bar{background:#fff3cd;border:1px solid #ffc107;padding:8px 12px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none;word-break:break-all}
.form-grid.full-width .form-group{grid-column:1/-1}
@media(max-width:1024px){.main-content{padding:16px 18px}}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.hamburger{display:flex}.sidebar-overlay{display:block}
.main-content{margin-left:0;width:100%;padding:60px 12px 16px}.top-bar{flex-direction:column}.top-bar-left h1{font-size:17px}
.form-grid{grid-template-columns:1fr}.dash-section{padding:12px}table{min-width:600px}.toast{left:12px;right:12px;bottom:12px;max-width:none}}
@media(max-width:480px){.table-toolbar{flex-direction:column}.table-toolbar .search-wrap{min-width:100%}.table-toolbar select{width:100%}.form-actions{flex-direction:column}.form-actions button{width:100%}}
</style>
</head>
<body>
<button class="hamburger" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="sidebar" id="sidebar">
<div class="sidebar-brand"><img src="dblogo.png" alt="Logo"><h2>Donation Box Inventory</h2></div>
<div class="sidebar-menu" id="dynamicSidebarMenu"><div class="menu-item active"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div></div>
<div class="sidebar-footer"><button class="btn-logout" id="logoutBtn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button></div>
</div>

<div class="main-content">
<div class="top-bar">
<div class="top-bar-left"><h1>User Management</h1></div>
<div class="user-info">
<div class="avatar" id="userAvatar">U</div>
<span class="name" id="adminName">Loading...</span>
<span class="desig" id="userRoleBadge">&mdash;</span>
</div>
</div>

<div id="debugInfo" class="debug-bar"></div>

<div class="dash-section">
<div class="section-header">
<h2><i class="fa-solid fa-user-plus"></i> <span id="formTitle">Add New User</span></h2>
</div>
<form id="userForm" autocomplete="off">
<div class="form-grid">
<div class="form-group">
<label>Full Name <span class="required">*</span></label>
<input type="text" id="userName" required placeholder="Enter full name">
</div>
<div class="form-group">
<label>Email <span class="required">*</span></label>
<input type="email" id="userEmail" required placeholder="Enter email address">
</div>
<div class="form-group">
<label>Employee Code <span class="required">*</span></label>
<input type="text" id="userEmpCode" required placeholder="Enter employee code">
</div>
<div class="form-group">
<label>Role <span class="required">*</span></label>
<select id="userRole" required>
<option value="">Select Role</option>
<option value="Super Admin">Super Admin</option>
<option value="Admin">Admin</option>
<option value="Regional Manager">Regional Manager</option>
<option value="Regional Office">Regional Office</option>
<option value="State Manager">State Manager</option>
<option value="State Office">State Office</option>
<option value="Division Manager">Division Manager</option>
<option value="Warehouse Manager">Warehouse Manager</option>
<option value="Inventory Loader">Inventory Loader</option>
<option value="User">User</option>
</select>
</div>
<div class="form-group">
<label>Region</label>
<select id="userRegion"><option value="">Select Region</option></select>
</div>
<div class="form-group">
<label>State</label>
<select id="userState" disabled><option value="">Select State</option></select>
</div>
<div class="form-group">
<label>Division</label>
<select id="userDivision" disabled><option value="">Select Division</option></select>
</div>
<div class="form-group">
<label>Hub</label>
<select id="userHub"><option value="">Select Hub</option></select>
</div>
<div class="form-group">
<label>Password <span class="required" id="pwdRequired">*</span></label>
<div class="password-wrapper">
<input type="password" id="userPassword" placeholder="Enter password">
<button type="button" class="pwd-toggle" id="pwdToggle"><i class="fa-regular fa-eye"></i></button>
</div>
</div>
<div class="form-group">
<label>Status</label>
<select id="userStatus">
<option value="Active">Active</option>
<option value="Inactive">Inactive</option>
</select>
</div>
</div>
<div class="form-actions">
<button type="submit" class="btn-action" id="submitBtn"><i class="fa-solid fa-floppy-disk"></i> Save User</button>
<button type="button" class="btn-action-secondary" id="cancelBtn" style="display:none"><i class="fa-solid fa-xmark"></i> Cancel</button>
</div>
</form>
</div>

<div class="dash-section">
<div class="section-header">
<h2><i class="fa-solid fa-users"></i> Users List</h2>
<span style="font-size:11px;color:var(--text-muted)" id="userCount">0 users</span>
</div>
<div class="table-toolbar">
<div class="search-wrap">
<i class="fa-solid fa-search"></i>
<input type="text" id="searchUser" placeholder="Search by name or email...">
</div>
<select id="filterRole">
<option value="">All Roles</option>
<option value="Super Admin">Super Admin</option>
<option value="Admin">Admin</option>
<option value="Regional Manager">Regional Manager</option>
<option value="Regional Office">Regional Office</option>
<option value="State Manager">State Manager</option>
<option value="State Office">State Office</option>
<option value="Division Manager">Division Manager</option>
<option value="Warehouse Manager">Warehouse Manager</option>
<option value="Inventory Loader">Inventory Loader</option>
<option value="User">User</option>
</select>
</div>
<div class="table-wrap">
<table>
<thead>
<tr><th>S.No</th><th>Name</th><th>Email</th><th>Emp Code</th><th>Role</th><th>Region</th><th>State</th><th>Division</th><th>Hub</th><th>Status</th><th>Actions</th></tr>
</thead>
<tbody id="usersTableBody"><tr><td colspan="11"><div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i><p>Loading users...</p></div></td></tr></tbody>
</table>
</div>
</div>

<div style="text-align:center;padding:16px 0;font-size:11px;color:var(--text-muted)">Donation Box Inventory | &copy; 2026</div>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-check-circle"></i><span id="toastMsg">Done</span></div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script>
var firebaseConfig = {
apiKey: "AIzaSyDrblc5WOyRrSMRJdWIPm8DX2p-YSeS5MQ",
authDomain: "prodution-box-erp.firebaseapp.com",
projectId: "prodution-box-erp",
storageBucket: "prodution-box-erp.firebasestorage.app",
messagingSenderId: "426698063494",
appId: "1:426698063494:web:880dd323f24bd4121ddb07",
measurementId: "G-948852RZLB"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

var allRegions = [], allStates = [], allDivisions = [], allHubs = [], allUsers = [];
var currentUser = null, editingUserId = null;

function showToast(msg, icon) {
var t = document.getElementById('toast');
document.getElementById('toastMsg').textContent = msg;
t.querySelector('i').className = icon || 'fa-solid fa-check-circle';
t.classList.add('show');
setTimeout(function(){ t.classList.remove('show') }, 2500);
}

function debugLog(msg) {
var d = document.getElementById('debugInfo');
if (!d) return;
d.style.display = 'block';
d.innerHTML = d.innerHTML + '<div>' + escapeHtml(msg) + '</div>';
console.log('[UserMgmt] ' + msg);
}

function getInitials(n) {
return n ? n.split(' ').map(function(w){ return w[0] }).join('').toUpperCase().slice(0,2) : 'U';
}

document.getElementById('hamburgerBtn').addEventListener('click', function(){
document.getElementById('sidebar').classList.toggle('open');
document.getElementById('sidebarOverlay').classList.toggle('show');
});
document.getElementById('sidebarOverlay').addEventListener('click', function(){
document.getElementById('sidebar').classList.remove('open');
document.getElementById('sidebarOverlay').classList.remove('show');
});

function mi(icon, label, href, active) {
return '<a' + (href ? ' href="' + href + '"' : '') + ' class="menu-item' + (active ? ' active' : '') + '"><i class="' + icon + '"></i> ' + label + '</a>';
}

function setupSidebar(user) {
var menu = document.getElementById('dynamicSidebarMenu');
var items = mi('fa-solid fa-chart-pie', 'Dashboard', 'dashboard.html');
if (["Super Admin", "Admin"].indexOf(user.role) !== -1) {
items += mi('fa-solid fa-cubes', 'Items', 'items.html');
items += mi('fa-solid fa-users-gear', 'User Management', 'users.html', true);
}
if (['Super Admin','Admin','Regional Manager','Regional Office','State Manager','State Office'].indexOf(user.role) !== -1) {
items += mi('fa-solid fa-warehouse', 'Warehouse', 'hubs.html');
}
items += mi('fa-solid fa-arrow-down-long', 'Stock IN', 'stock-in.html');
items += mi('fa-solid fa-arrow-up-long', 'Stock OUT', 'stock-out.html');
items += mi('fa-solid fa-file-signature', 'Demand', 'demand.html');
menu.innerHTML = items;
}

document.getElementById('logoutBtn').addEventListener('click', function(){
localStorage.removeItem('userSession');
showToast('Logging out...');
setTimeout(function(){ window.location.href = 'login.html' }, 800);
});

document.getElementById('pwdToggle').addEventListener('click', function(){
var inp = document.getElementById('userPassword');
var icon = this.querySelector('i');
if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fa-regular fa-eye-slash'; }
else { inp.type = 'password'; icon.className = 'fa-regular fa-eye'; }
});

document.getElementById('userRegion').addEventListener('change', function(){
var region = this.value;
var stateSel = document.getElementById('userState');
var divSel = document.getElementById('userDivision');
stateSel.innerHTML = '<option value="">Select State</option>';
stateSel.disabled = !region;
divSel.innerHTML = '<option value="">Select Division</option>';
divSel.disabled = true;
if (region) {
for (var i = 0; i < allStates.length; i++) {
if (allStates[i].region === region) {
var o = document.createElement('option'); o.value = allStates[i].name; o.textContent = allStates[i].name; stateSel.appendChild(o);
}
}
}
});

document.getElementById('userState').addEventListener('change', function(){
var state = this.value;
var divSel = document.getElementById('userDivision');
divSel.innerHTML = '<option value="">Select Division</option>';
divSel.disabled = !state;
if (state) {
for (var i = 0; i < allDivisions.length; i++) {
if (allDivisions[i].state === state) {
var o = document.createElement('option'); o.value = allDivisions[i].name; o.textContent = allDivisions[i].name; divSel.appendChild(o);
}
}
}
});

document.getElementById('cancelBtn').addEventListener('click', resetForm);

document.getElementById('userForm').addEventListener('submit', function(e){
e.preventDefault();
var btn = document.getElementById('submitBtn');
btn.disabled = true;
btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
if (editingUserId) { updateUser(); }
else { addUser(); }
});

function resetForm() {
document.getElementById('userForm').reset();
document.getElementById('userState').disabled = true;
document.getElementById('userDivision').disabled = true;
document.getElementById('userState').innerHTML = '<option value="">Select State</option>';
document.getElementById('userDivision').innerHTML = '<option value="">Select Division</option>';
document.getElementById('pwdRequired').style.display = 'inline';
document.getElementById('userPassword').required = true;
document.getElementById('formTitle').textContent = 'Add New User';
document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save User';
document.getElementById('cancelBtn').style.display = 'none';
editingUserId = null;
}

function populateRegionSelect(selected) {
var sel = document.getElementById('userRegion');
sel.innerHTML = '<option value="">Select Region</option>';
for (var i = 0; i < allRegions.length; i++) {
var o = document.createElement('option'); o.value = allRegions[i].name; o.textContent = allRegions[i].name;
if (allRegions[i].name === selected) o.selected = true;
sel.appendChild(o);
}
}

function populateHubSelect(selected) {
var sel = document.getElementById('userHub');
sel.innerHTML = '<option value="">Select Hub</option>';
for (var i = 0; i < allHubs.length; i++) {
var o = document.createElement('option'); o.value = allHubs[i].name; o.textContent = allHubs[i].name;
if (allHubs[i].name === selected) o.selected = true;
sel.appendChild(o);
}
}

async function addUser() {
try {
var email = document.getElementById('userEmail').value.trim().toLowerCase();
var exists = false;
for (var i = 0; i < allUsers.length; i++) {
if (allUsers[i].email && allUsers[i].email.toLowerCase() === email) { exists = true; break; }
}
if (exists) { showToast('Email already exists!', 'fa-solid fa-triangle-exclamation'); resetBtn(); return; }
var data = {
fullName: document.getElementById('userName').value.trim(),
email: email,
employeeCode: document.getElementById('userEmpCode').value.trim(),
role: document.getElementById('userRole').value,
region: document.getElementById('userRegion').value || '',
state: document.getElementById('userState').value || '',
division: document.getElementById('userDivision').value || '',
hub: document.getElementById('userHub').value || '',
password: document.getElementById('userPassword').value,
status: document.getElementById('userStatus').value,
createdAt: new Date().toISOString(),
createdBy: (currentUser && (currentUser.fullName || currentUser.email)) || ''
};
await db.collection('users').add(data);
showToast('User added successfully!');
resetForm();
await loadUsers();
} catch(e) { console.error(e); showToast('Error adding user: ' + e.message, 'fa-solid fa-triangle-exclamation'); }
resetBtn();
}

async function updateUser() {
try {
var data = {
fullName: document.getElementById('userName').value.trim(),
email: document.getElementById('userEmail').value.trim().toLowerCase(),
employeeCode: document.getElementById('userEmpCode').value.trim(),
role: document.getElementById('userRole').value,
region: document.getElementById('userRegion').value || '',
state: document.getElementById('userState').value || '',
division: document.getElementById('userDivision').value || '',
hub: document.getElementById('userHub').value || '',
status: document.getElementById('userStatus').value,
updatedAt: new Date().toISOString(),
updatedBy: (currentUser && (currentUser.fullName || currentUser.email)) || ''
};
var pwd = document.getElementById('userPassword').value;
if (pwd) data.password = pwd;
await db.collection('users').doc(editingUserId).update(data);
showToast('User updated successfully!');
resetForm();
await loadUsers();
} catch(e) { console.error(e); showToast('Error updating user: ' + e.message, 'fa-solid fa-triangle-exclamation'); }
resetBtn();
}

function resetBtn() {
var btn = document.getElementById('submitBtn');
btn.disabled = false;
btn.innerHTML = editingUserId ? '<i class="fa-solid fa-floppy-disk"></i> Update User' : '<i class="fa-solid fa-floppy-disk"></i> Save User';
}

async function deleteUser(id, name) {
if (!confirm('Are you sure you want to delete user "' + name + '"? This action cannot be undone.')) return;
try {
await db.collection('users').doc(id).delete();
showToast('User deleted successfully!');
await loadUsers();
} catch(e) { console.error(e); showToast('Error deleting user: ' + e.message, 'fa-solid fa-triangle-exclamation'); }
}

function editUser(id) {
var u = null;
for (var i = 0; i < allUsers.length; i++) {
if (allUsers[i].id === id) { u = allUsers[i]; break; }
}
if (!u) return;
editingUserId = id;
document.getElementById('formTitle').textContent = 'Edit User';
document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Update User';
document.getElementById('cancelBtn').style.display = 'inline-flex';
document.getElementById('pwdRequired').style.display = 'none';
document.getElementById('userPassword').required = false;
document.getElementById('userName').value = u.fullName || '';
document.getElementById('userEmail').value = u.email || '';
document.getElementById('userEmpCode').value = u.employeeCode || '';
document.getElementById('userRole').value = u.role || '';
document.getElementById('userStatus').value = u.status || 'Active';
document.getElementById('userPassword').value = '';
populateRegionSelect(u.region || '');
populateHubSelect(u.hub || '');
var region = u.region || '';
var stateSel = document.getElementById('userState');
stateSel.innerHTML = '<option value="">Select State</option>';
stateSel.disabled = !region;
if (region) {
for (var i = 0; i < allStates.length; i++) {
if (allStates[i].region === region) {
var o = document.createElement('option'); o.value = allStates[i].name; o.textContent = allStates[i].name;
if (allStates[i].name === u.state) o.selected = true;
stateSel.appendChild(o);
}
}
}
var state = u.state || '';
var divSel = document.getElementById('userDivision');
divSel.innerHTML = '<option value="">Select Division</option>';
divSel.disabled = !state;
if (state) {
for (var i = 0; i < allDivisions.length; i++) {
if (allDivisions[i].state === state) {
var o = document.createElement('option'); o.value = allDivisions[i].name; o.textContent = allDivisions[i].name;
if (allDivisions[i].name === u.division) o.selected = true;
divSel.appendChild(o);
}
}
}
document.getElementById('userForm').scrollIntoView({behavior:'smooth'});
}

function renderTable(users) {
var tb = document.getElementById('usersTableBody');
var searchVal = document.getElementById('searchUser').value.trim().toLowerCase();
var roleFilter = document.getElementById('filterRole').value;
var filtered = [];
for (var i = 0; i < users.length; i++) {
var u = users[i];
if (roleFilter && u.role !== roleFilter) continue;
if (searchVal) {
var name = (u.fullName || '').toLowerCase();
var email = (u.email || '').toLowerCase();
if (name.indexOf(searchVal) === -1 && email.indexOf(searchVal) === -1) continue;
}
filtered.push(u);
}
document.getElementById('userCount').textContent = filtered.length + ' users';
tb.innerHTML = '';
if (!filtered.length) {
tb.innerHTML = '<tr><td colspan="11"><div class="empty-state"><i class="fa-solid fa-users-slash"></i><p>No users found.</p></div></td></tr>';
return;
}
for (var i = 0; i < filtered.length; i++) {
var u = filtered[i];
var statusClass = (u.status === 'Active') ? 'status-active' : 'status-inactive';
var row = '<tr><td>' + (i + 1) + '</td><td><strong>' + safeVal(u.fullName) + '</strong></td><td>' + safeVal(u.email) + '</td><td>' + safeVal(u.employeeCode) + '</td><td>' + safeVal(u.role) + '</td><td>' + safeVal(u.region) + '</td><td>' + safeVal(u.state) + '</td><td>' + safeVal(u.division) + '</td><td>' + safeVal(u.hub) + '</td><td><span class="status-badge ' + statusClass + '">' + safeVal(u.status, 'Active') + '</span></td><td><button class="action-btn edit" onclick="editUser(\'' + escapeAttr(u.id) + '\')"><i class="fa-solid fa-pen-to-square"></i> Edit</button> <button class="action-btn delete" onclick="deleteUser(\'' + escapeAttr(u.id) + '\',\'' + escapeAttr(u.fullName || '') + '\')"><i class="fa-solid fa-trash-can"></i> Delete</button></td></tr>';
tb.innerHTML += row;
}
}

function safeVal(val, fallback) {
if (val === null || val === undefined || val === '') return fallback || '-';
return escapeHtml(String(val));
}

function escapeHtml(s) {
if (!s) return '';
return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escapeAttr(s) {
if (!s) return '';
return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

document.getElementById('searchUser').addEventListener('input', function(){ renderTable(allUsers); });
document.getElementById('filterRole').addEventListener('change', function(){ renderTable(allUsers); });

async function loadMasterData() {
try {
debugLog('Loading master data (regions, states, divisions, hubs)...');
var regSnap = await db.collection('regions').get();
var stateSnap = await db.collection('states').get();
var divSnap = await db.collection('divisions').get();
var hubSnap = await db.collection('hubs').get();
allRegions = regSnap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()) });
allStates = stateSnap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()) });
allDivisions = divSnap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()) });
allHubs = hubSnap.docs.map(function(d){ return Object.assign({id: d.id}, d.data()) });
debugLog('Master data loaded: ' + allRegions.length + ' regions, ' + allStates.length + ' states, ' + allDivisions.length + ' divisions, ' + allHubs.length + ' hubs');
populateRegionSelect();
populateHubSelect();
} catch(e) { console.error(e); debugLog('Error loading master data: ' + e.message); showToast('Error loading master data', 'fa-solid fa-triangle-exclamation'); }
}

async function loadUsers() {
try {
debugLog('Loading users from Firebase...');
var snap = await db.collection('users').get();
debugLog('Firebase returned ' + snap.docs.length + ' documents');
var tempUsers = [];
for (var i = 0; i < snap.docs.length; i++) {
var d = snap.docs[i];
var data = d.data();
if (!data) {
debugLog('WARNING: Document ' + d.id + ' has no data, skipping');
continue;
}
tempUsers.push(Object.assign({id: d.id}, data));
}
allUsers = tempUsers;
debugLog('Mapped ' + allUsers.length + ' users');
if (currentUser && currentUser.role !== 'Super Admin') {
var filtered = [];
for (var i = 0; i < allUsers.length; i++) {
var u = allUsers[i];
if (currentUser.region && u.region !== currentUser.region) continue;
if (currentUser.state && u.state !== currentUser.state) continue;
if (currentUser.division && u.division !== currentUser.division) continue;
filtered.push(u);
}
debugLog('Filtered to ' + filtered.length + ' users (non-Super Admin view)');
allUsers = filtered;
}
renderTable(allUsers);
debugLog('Users rendered successfully');
} catch(e) { console.error(e); debugLog('ERROR loading users: ' + e.message); showToast('Error loading users: ' + e.message, 'fa-solid fa-triangle-exclamation');
document.getElementById('usersTableBody').innerHTML = '<tr><td colspan="11"><div class="empty-state"><i class="fa-solid fa-triangle-exclamation" style="color:#ef4444;opacity:0.8"></i><p>Error loading users. Check console (F12) for details.</p><p style="font-size:11px;margin-top:4px;color:#dc2626">' + escapeHtml(e.message) + '</p></div></td></tr>';
}
}

window.addEventListener('DOMContentLoaded', async function(){
try {
debugLog('Page loaded, initializing...');
var sessionStr = localStorage.getItem('userSession');
if (!sessionStr) {
debugLog('No session found, redirecting to login');
showToast('Session invalid! Redirecting...');
setTimeout(function(){ window.location.href = 'login.html' }, 1200);
return;
}
var user = JSON.parse(sessionStr);
debugLog('Session user: ' + (user.email || 'unknown') + ', role: ' + (user.role || 'none'));
if (!user || !user.role) {
debugLog('Invalid session data');
showToast('Session invalid! Redirecting...');
setTimeout(function(){ window.location.href = 'login.html' }, 1200);
return;
}
if (["Super Admin", "Admin"].indexOf(user.role) === -1) {
debugLog('Access denied for role: ' + user.role);
showToast('Access denied! Redirecting...');
setTimeout(function(){ window.location.href = 'dashboard.html' }, 1200);
return;
}
currentUser = user;
document.getElementById('userAvatar').textContent = getInitials(user.fullName);
document.getElementById('adminName').innerText = user.fullName || 'User';
document.getElementById('userRoleBadge').innerText = user.role || '-';
setupSidebar(user);
debugLog('Loading data...');
await loadMasterData();
await loadUsers();
debugLog('Initialization complete');
} catch(e) {
console.error('FATAL ERROR in initialization:', e);
debugLog('FATAL ERROR: ' + e.message);
showToast('Error loading page: ' + e.message, 'fa-solid fa-triangle-exclamation');
}
});
</script>
